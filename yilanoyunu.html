<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { background: #111; margin: 0; display: flex; flex-direction: column; align-items: center; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #skor { font-size: 20px; color: #ff0050; margin: 5px; }
        canvas { background: #000; border: 2px solid #333; border-radius: 8px; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 10px; }
        .btn { background: #222; color: #fff; border: 2px solid #ff0050; padding: 15px; font-size: 20px; border-radius: 10px; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; user-select: none; }
        .btn:active { background: #ff0050; }
        #up { grid-column: 2; }
        #left { grid-column: 1; }
        #right { grid-column: 3; }
        #down { grid-column: 2; }
    </style>
</head>
<body>
    <div id="skor">SKOR: 0</div>
    <canvas id="snakeBoard" width="300" height="300"></canvas>
    <div class="controls">
        <button class="btn" id="up">↑</button>
        <button class="btn" id="left">←</button>
        <button class="btn" id="down">↓</button>
        <button class="btn" id="right">→</button>
    </div>
    <script>
        const canvas = document.getElementById("snakeBoard");
        const ctx = canvas.getContext("2d");
        const grid = 20;
        let score = 0;
        let snake = [{x: 160, y: 160}, {x: 140, y: 160}];
        let apple = {x: 60, y: 60};
        let d = "RIGHT";

        function changeDir(newDir) {
            if (newDir == "LEFT" && d != "RIGHT") d = "LEFT";
            if (newDir == "UP" && d != "DOWN") d = "UP";
            if (newDir == "RIGHT" && d != "LEFT") d = "RIGHT";
            if (newDir == "DOWN" && d != "UP") d = "DOWN";
        }

        document.addEventListener("keydown", e => {
            if(e.keyCode == 37) changeDir("LEFT");
            if(e.keyCode == 38) changeDir("UP");
            if(e.keyCode == 39) changeDir("RIGHT");
            if(e.keyCode == 40) changeDir("DOWN");
        });

        document.getElementById("up").onclick = () => changeDir("UP");
        document.getElementById("down").onclick = () => changeDir("DOWN");
        document.getElementById("left").onclick = () => changeDir("LEFT");
        document.getElementById("right").onclick = () => changeDir("RIGHT");

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff0050";
            ctx.fillRect(apple.x, apple.y, grid-2, grid-2);
            snake.forEach((part, index) => {
                ctx.fillStyle = (index === 0) ? "#00ff96" : "#008e54";
                ctx.fillRect(part.x, part.y, grid-2, grid-2);
            });
            let headX = snake[0].x;
            let headY = snake[0].y;
            if(d == "LEFT") headX -= grid;
            if(d == "UP") headY -= grid;
            if(d == "RIGHT") headX += grid;
            if(d == "DOWN") headY += grid;

            if(headX == apple.x && headY == apple.y) {
                score += 10;
                document.getElementById("skor").innerHTML = "SKOR: " + score;
                apple = { x: Math.floor(Math.random() * 14) * grid, y: Math.floor(Math.random() * 14) * grid };
            } else { snake.pop(); }

            let newHead = { x: headX, y: headY };
            if(headX < 0 || headX >= canvas.width || headY < 0 || headY >= canvas.height || snake.some(p => p.x === newHead.x && p.y === newHead.y)) {
                snake = [{x: 160, y: 160}, {x: 140, y: 160}]; d = "RIGHT"; score = 0; document.getElementById("skor").innerHTML = "SKOR: 0";
            } else { snake.unshift(newHead); }
        }
        setInterval(draw, 150);
    </script>
</body>
</html>
