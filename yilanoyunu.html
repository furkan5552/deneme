<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { 
            background: #000; margin: 0; display: flex; flex-direction: column; 
            align-items: center; color: white; font-family: sans-serif; 
            overflow: hidden; touch-action: none; height: 100vh; 
        }
        #skor { font-size: 24px; font-weight: bold; color: #00ff96; margin: 15px; text-shadow: 0 0 10px #00ff96; }
        
        /* OYUN ALANI */
        canvas { background: #050505; border: 3px solid #333; border-radius: 15px; }

        /* BUTON DÜZENLEME (BURASI KRİTİK) */
        .controls { 
            display: grid; 
            grid-template-columns: 80px 80px 80px; /* 3 sütun */
            grid-template-rows: 80px 80px;       /* 2 satır */
            gap: 15px; 
            margin-top: 25px; 
        }
        
        .btn { 
            background: #222; color: #fff; border: 2px solid #00ff96; 
            border-radius: 15px; font-size: 35px; display: flex; 
            align-items: center; justify-content: center; user-select: none;
            box-shadow: 0 4px 0 #008e54;
        }
        .btn:active { 
            background: #00ff96; color: #000; 
            transform: translateY(4px); box-shadow: none; 
        }

        /* DÜĞME KONUMLARI */
        #up { grid-column: 2; grid-row: 1; }    /* Üst orta */
        #left { grid-column: 1; grid-row: 2; }  /* Alt sol */
        #down { grid-column: 2; grid-row: 2; }  /* Alt orta */
        #right { grid-column: 3; grid-row: 2; } /* Alt sağ */
    </style>
</head>
<body>
    <div id="skor">SKOR: 0</div>
    <canvas id="snakeBoard" width="300" height="300"></canvas>
    
    <div class="controls">
        <div class="btn" id="up">↑</div>
        <div class="btn" id="left">←</div>
        <div class="btn" id="down">↓</div>
        <div class="btn" id="right">→</div>
    </div>

    <script>
        const canvas = document.getElementById("snakeBoard");
        const ctx = canvas.getContext("2d");
        const grid = 20;
        let score = 0;
        let snake = [{x: 160, y: 160}, {x: 140, y: 160}];
        let apple = {x: 60, y: 60};
        let d = "RIGHT";
        let nextD = "RIGHT";
        let currentSpeed = 200;

        function changeDir(newDir) {
            if (newDir == "LEFT" && d != "RIGHT") nextD = "LEFT";
            if (newDir == "UP" && d != "DOWN") nextD = "UP";
            if (newDir == "RIGHT" && d != "LEFT") nextD = "RIGHT";
            if (newDir == "DOWN" && d != "UP") nextD = "DOWN";
        }

        const buttons = ["up", "down", "left", "right"];
        buttons.forEach(id => {
            const el = document.getElementById(id);
            el.addEventListener("touchstart", (e) => { e.preventDefault(); changeDir(id.toUpperCase()); });
            el.addEventListener("mousedown", () => changeDir(id.toUpperCase()));
        });

        function gameLoop() {
            d = nextD;
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff0050";
            ctx.fillRect(apple.x, apple.y, grid-2, grid-2);
            snake.forEach((part, index) => {
                ctx.fillStyle = (index === 0) ? "#00ff96" : "#008e54";
                ctx.fillRect(part.x, part.y, grid-2, grid-2);
            });
            let headX = snake[0].x; let headY = snake[0].y;
            if(d == "LEFT") headX -= grid; if(d == "UP") headY -= grid; if(d == "RIGHT") headX += grid; if(d == "DOWN") headY += grid;
            if(headX == apple.x && headY == apple.y) {
                score += 10;
                if (currentSpeed > 40) currentSpeed -= 10;
                document.getElementById("skor").innerHTML = "SKOR: " + score;
                apple = { x: Math.floor(Math.random() * 14) * grid, y: Math.floor(Math.random() * 14) * grid };
            } else { snake.pop(); }
            let newHead = { x: headX, y: headY };
            if(headX < 0 || headX >= 300 || headY < 0 || headY >= 300 || snake.some(p => p.x === newHead.x && p.y === newHead.y)) {
                snake = [{x: 160, y: 160}]; nextD = "RIGHT"; score = 0; currentSpeed = 200;
                document.getElementById("skor").innerHTML = "SKOR: 0";
            } else { snake.unshift(newHead); }
            setTimeout(gameLoop, currentSpeed);
        }
        gameLoop();
    </script>
</body>
</html>
