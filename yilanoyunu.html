<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* CANLI ARKA PLAN */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body { 
            background: linear-gradient(-45deg, #050505, #121225, #050505);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            color: white; font-family: sans-serif; overflow: hidden; touch-action: none; height: 100vh;
        }

        #info-container {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #00ff96;
            border-radius: 12px;
            padding: 10px 25px;
            margin: 10px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 255, 150, 0.3);
        }

        #skor { font-size: 22px; font-weight: bold; color: #00ff96; text-shadow: 0 0 10px #00ff96; }
        #hiz-ms { font-size: 14px; color: #00f2ea; margin-top: 4px; }

        canvas { 
            background: rgba(0, 0, 0, 0.9);
            border: 3px solid #00f2ea; 
            border-radius: 12px; 
            box-shadow: 0 0 25px rgba(0, 242, 234, 0.3);
        }

        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 15px; }
        .btn { 
            background: rgba(20, 20, 30, 0.9); 
            color: #00f2ea; 
            border: 2px solid #00f2ea; 
            width: 70px; height: 70px; border-radius: 20px; 
            font-size: 32px; display: flex; align-items: center; 
            justify-content: center; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: #00f2ea; color: #000; transform: scale(0.9); }
        #up { grid-column: 2; border-color: #00ff96; color: #00ff96; }
        #up:active { background: #00ff96; }
    </script>
</head>
<body>
    <div id="info-container">
        <div id="skor">SKOR: 0</div>
        <div id="hiz-ms">GECİKME: 200ms (Yavaş)</div>
    </div>

    <canvas id="snakeBoard" width="300" height="300"></canvas>
    
    <div class="controls">
