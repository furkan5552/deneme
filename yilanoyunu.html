<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Snake - Furkan Hub</title>
    <style>
        :root { --neon: #00ff96; --rose: #ff0050; --cyber: #00f2ea; }
        body { 
            background: #000; margin: 0; color: white; 
            font-family: sans-serif; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; height: 100vh; overflow: hidden;
        }
        canvas { 
            border: 3px solid var(--neon); background: #050505; 
            box-shadow: 0 0 20px rgba(0, 255, 150, 0.2); border-radius: 15px;
            max-width: 90vw; max-height: 70vw;
        }
        .score { font-size: 32px; font-weight: 900; color: var(--neon); margin-bottom: 10px; }
        
        /* MOBİL KONTROLLER */
        .controls { 
            display: grid; grid-template-columns: repeat(3, 70px); 
            gap: 10px; margin-top: 20px; 
        }
        .btn { 
            background: #111; border: 2px solid var(--cyber); color: var(--cyber);
            height: 70px; border-radius: 15px; display: flex; align-items: center; 
            justify-content: center; font-size: 30px; cursor: pointer;
        }
        .btn:active { background: var(--cyber); color: #000; }
        #up { grid-column: 2; }
        #left { grid-column: 1; }
        #down { grid-column: 2; }
        #right { grid-column: 3; }
    </style>
</head>
<body>

    <div class="score">SKOR: <span id="val">0</span></div>
    <canvas id="snakeCanvas"></canvas>

    <div class="controls">
        <div class="btn" id="up">↑</div>
        <div class="btn" id="left">←</div>
        <div class="btn" id="down">↓</div>
        <div class="btn" id="right">→</div>
    </div>

    <script>
        const canvas = document.getElementById("snakeCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("val");

        // Kare boyutu ve hızı
        const box = 20;
        canvas.width = 360; 
        canvas.height = 360;

        let score = 0;
        let snake = [{ x: 180, y: 180 }];
        let food = { x: 80, y: 80 };
        let d = "RIGHT";
        let nextD = "RIGHT";

        // Yön Kontrolü
        const setDir = (dir) => {
            if (dir == "UP" && d != "DOWN") nextD = "UP";
            if (dir == "DOWN" && d != "UP") nextD = "DOWN";
            if (dir == "LEFT" && d != "RIGHT") nextD = "LEFT";
            if (dir == "RIGHT" && d != "LEFT") nextD = "RIGHT";
        };

        document.getElementById("up").onclick = () => setDir("UP");
        document.getElementById("down").onclick = () => setDir("DOWN");
        document.getElementById("left").onclick = () => setDir("LEFT");
        document.getElementById("right").onclick = () => setDir("RIGHT");

        // Klavye desteği
        window.onkeydown = (e) => {
            if(e.key == "ArrowUp") setDir("UP");
            if(e.key == "ArrowDown") setDir("DOWN");
            if(e.key == "ArrowLeft") setDir("LEFT");
            if(e.key == "ArrowRight") setDir("RIGHT");
        };

        function draw() {
            d = nextD;
            ctx.fillStyle = "#0c0c0c";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Yılanı Çiz
            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#00ff96" : "#00a1ff";
                ctx.fillRect(snake[i].x, snake[i].y, box - 2, box - 2);
            }

            // Yemi Çiz
            ctx.fillStyle = "#ff0050";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#ff0050";
            ctx.fillRect(food.x, food.y, box - 2, box - 2);
            ctx.shadowBlur = 0;

            // Kafa pozisyonu
            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if (d == "LEFT") snakeX -= box;
            if (d == "UP") snakeY -= box;
            if (d == "RIGHT") snakeX += box;
            if (d == "DOWN") snakeY += box;

            // Yemek yendi mi?
            if (snakeX == food.x && snakeY == food.y) {
                score += 10;
                scoreEl.innerText = score;
                food = {
                    x: Math.floor(Math.random() * 18) * box,
                    y: Math.floor(Math.random() * 18) * box
                };
            } else {
                snake.pop();
            }
