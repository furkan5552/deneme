<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yılan Oyunu - Pro</title>
    <style>
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body { 
            background: linear-gradient(-45deg, #0a0a12, #1a0f2e, #0a1622);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; color: white; font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; touch-action: none; height: 100vh;
        }

        /* GİRİŞ EKRANI */
        #login-screen {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }
        input { padding: 12px; border-radius: 8px; border: 2px solid #00ff96; background: #111; color: white; margin-bottom: 15px; width: 200px; text-align: center; }
        .start-btn { padding: 10px 25px; background: #00ff96; color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* SKOR TABLOSU (SAĞ ÜST) */
        #leaderboard {
            position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7);
            border: 1px solid #00f2ea; padding: 10px; border-radius: 8px; font-size: 12px;
            max-width: 120px;
        }

        #game-container { display: none; flex-direction: column; align-items: center; }

        #skor-panel { font-size: 24px; font-weight: bold; color: #00ff96; margin-bottom: 10px; }

        canvas { border: 3px solid #00f2ea; border-radius: 12px; box-shadow: 0 0 20px rgba(0, 242, 234, 0.4); max-width: 90vw; max-height: 40vh; }

        .controls { display: grid; grid-template-columns: repeat(3, 70px); grid-template-rows: repeat(2, 70px); gap: 10px; margin-top: 15px; }
        .btn { background: rgba(255,255,255,0.1); color: #00f2ea; border: 2px solid #00f2ea; border-radius: 15px; font-size: 28px; display: flex; align-items: center; justify-content: center; user-select: none; }
        .btn:active { background: #00f2ea; color: black; }
        #up { grid-column: 2; }
        #left { grid-column: 1; grid-row: 2; }
        #down { grid-column: 2; grid-row: 2; }
        #right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color: #00ff96;">YILAN PRO</h1>
        <input type="text" id="username" placeholder="Kullanıcı Adı Gir" maxlength="10">
        <button class="start-btn" onclick="startGame()">BAŞLA</button>
    </div>

    <div id="leaderboard">
        <strong style="color: #00f2ea;">TOP SKORLAR</strong>
        <div id="score-list"></div>
    </div>

    <div id="game-container">
        <div id="skor-panel"><span id="user-display"></span>: <span id="skor">0</span></div>
        <canvas id="snakeBoard" width="400" height="400"></canvas>
        <div class="controls">
            <div class="btn" id="up">↑</div>
            <div class="btn" id="left">←</div>
            <div class="btn" id="down">↓</div>
            <div class="btn" id="right">→</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("snakeBoard");
        const ctx = canvas.getContext("2d");
        const grid = 20;
        let score = 0;
        let snake = [{x: 200, y: 200}, {x: 180, y: 200}];
        let apple = {x: 100, y: 100};
        let d = "RIGHT", nextD = "RIGHT", currentSpeed = 200;
        let playerName = "Anonim";

        // SKORLARI YÜKLE
        function updateLeaderboard() {
            let scores = JSON.parse(localStorage.getItem("snakeScores") || "[]");
            scores.sort((a, b) => b.score - a.score);
            scores = scores.slice(0, 5); // İlk 5 kişi
            document.getElementById("score-list").innerHTML = scores.map(s => `<div>${s.name}: ${s.score}</div>`).join("");
        }

        function saveScore() {
            let scores = JSON.parse(localStorage.getItem("snakeScores") || "[]");
            scores.push({name: playerName, score: score});
            localStorage.setItem("snakeScores", JSON.stringify(scores));
            updateLeaderboard();
        }

        function startGame() {
            const input = document.getElementById("username").value;
            if(input) playerName = input;
            document.getElementById("user-display").innerText = playerName;
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("game-container").style.display = "flex";
            updateLeaderboard();
            gameLoop();
        }

        function changeDir(newDir) {
            if (newDir == "LEFT" && d != "RIGHT") nextD = "LEFT";
            if (newDir == "UP" && d != "DOWN") nextD = "UP";
            if (newDir == "RIGHT" && d != "LEFT") nextD = "RIGHT";
            if (newDir == "DOWN" && d != "UP") nextD = "DOWN";
        }

        // KONTROLLER
        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowUp") changeDir("UP");
            if (e.key === "ArrowDown") changeDir("DOWN");
            if (e.key === "ArrowLeft") changeDir("LEFT");
            if (e.key === "ArrowRight") changeDir("RIGHT");
        });

        ["up", "down", "left", "right"].forEach(id => {
            const el = document.getElementById(id);
            el.addEventListener("touchstart", (e) => { e.preventDefault(); changeDir(id.toUpperCase()); });
            el.addEventListener("mousedown", () => changeDir(id.toUpperCase()));
        });

        function gameLoop() {
            d = nextD;
            ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Elma
            ctx.fillStyle = "#ff0050"; ctx.shadowBlur = 15; ctx.shadowColor = "#ff0050";
            ctx.fillRect(apple.x, apple.y, grid-2, grid-2); ctx.shadowBlur = 0;

            // Yılan
            snake.forEach((part, index) => {
                ctx.fillStyle = (index === 0) ? "#00ff96" : "#00a1ff";
                ctx.fillRect(part.x, part.y, grid-2, grid-2);
            });

            let headX = snake[0].x; let headY = snake[0].y;
            if(d == "LEFT") headX -= grid; if(d == "UP") headY -= grid;
            if(d == "RIGHT") headX += grid; if(d == "DOWN") headY += grid;

            if(headX == apple.x && headY == apple.y) {
                score += 10;
                if (currentSpeed > 50) currentSpeed -= 10;
                document.getElementById("skor").innerText = score;
                apple = { x: Math.floor(Math.random() * 19) * grid, y: Math.floor(Math.random() * 19) * grid };
            } else { snake.pop(); }

            let newHead = { x: headX, y: headY };

            if(headX < 0 || headX >= canvas.width || headY < 0 || headY >= canvas.height || snake.some(p => p.x === newHead.x && p.y === newHead.y)) {
                saveScore();
                alert("Oyun Bitti! Skorun: " + score);
                location.reload(); // Yeniden başlat
            } else {
                snake.unshift(newHead);
                setTimeout(gameLoop, currentSpeed);
            }
        }
        updateLeaderboard();
    </script>
</body>
</html>
