<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Furkan Hub v8 - Legend Edition</title>
    <style>
        :root { --neon: #00ff96; --rose: #ff0050; --cyber: #00f2ea; --gold: #ffd700; }
        * { box-sizing: border-box; touch-action: manipulation; user-select: none; outline: none; }
        body { background: #000; margin: 0; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        /* EKRAN KATMANLARI */
        .screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; visibility: visible; }
        .hidden { display: none !important; }

        /* PANEL VE BUTONLAR */
        .panel { background: #111; padding: 25px; border-radius: 25px; border: 3px solid var(--neon); text-align: center; width: 320px; box-shadow: 0 0 30px rgba(0,255,150,0.2); }
        .title { font-size: 32px; font-weight: 900; color: var(--neon); text-shadow: 0 0 15px var(--neon); margin-bottom: 20px; }
        input { padding: 15px; border: 2px solid var(--neon); background: #000; color: #fff; border-radius: 12px; width: 100%; text-align: center; margin-bottom: 15px; font-size: 18px; }
        .btn { padding: 15px; background: var(--neon); color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 18px; margin: 5px 0; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-gray { background: #333; color: white; }

        /* SKOR TABLOSU (LEADERBOARD) */
        #scoreboard { z-index: 9999; background: rgba(0,0,0,0.95); }
        .rank-list { background: #050505; border-radius: 15px; padding: 10px; margin: 15px 0; border: 1px solid #222; }
        .rank-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #111; font-size: 15px; }
        .rank-item.top { color: var(--gold); font-weight: bold; }

        /* OYUN ALANI */
        canvas { border: 2px solid #222; background: #000; border-radius: 15px; max-width: 90vw; }
        .live-score { font-size: 24px; color: var(--neon); margin-bottom: 10px; font-weight: bold; }

        /* MOBİL JOYSTICK */
        .joy { display: grid; grid-template-columns: repeat(3, 70px); gap: 10px; margin-top: 20px; }
        .j-btn { background: #1a1a1a; border: 2px solid var(--cyber); border-radius: 15px; height: 70px; display: flex; align-items: center; justify-content: center; font-size: 30px; color: var(--cyber); }
        #up { grid-column: 2; } #left { grid-column: 1; grid-row: 2; } #down { grid-column: 2; grid-row: 2; } #right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

    <div id="scr-login" class="screen">
        <div class="panel">
            <div class="title">FURKAN HUB</div>
            <input type="text" id="nick" placeholder="İSMİNİ YAZ" maxlength="12">
            <button class="btn" onclick="hub.login()">OYUNA GİR</button>
        </div>
    </div>

    <div id="scr-lobby" class="screen hidden">
        <div class="title" style="font-size: 20px;">HOŞ GELDİN <span id="u-display" style="color:var(--cyber)"></span></div>
        <div class="panel" style="border-color: var(--cyber);">
            <button class="btn" onclick="hub.start('snake')">🐍 NEON SNAKE</button>
            <button class="btn" onclick="hub.start('bird')">🐦 CYBER BIRD</button>
            <button class="btn btn-gray" onclick="hub.clear()">VERİLERİ SIFIRLA</button>
        </div>
    </div>

    <div id="scr-game" class="screen hidden">
        <div class="live-score">SKOR: <span id="val-now">0</span></div>
        <canvas id="gameCanvas"></canvas>
        <div id="snake-ui" class="joy hidden">
            <div class="j-btn" id="up">↑</div><div class="j-btn" id="left">←</div>
            <div class="j-btn" id="down">↓</div><div class="j-btn" id="right">→</div>
        </div>
        <button class="btn btn-gray" style="width:120px; font-size:14px; margin-top:15px;" onclick="location.reload()">MENÜ</button>
    </div>

    <div id="scoreboard" class="screen hidden">
        <div class="panel" style="border-color: var(--rose);">
            <div class="title" style="color:var(--rose);">OYUN BİTTİ</div>
            <div style="font-size: 14px; color: #888;">TUR SKORUN</div>
            <div style="font-size: 50px; font-weight: 900; margin: 10px 0;" id="val-final">0</div>
            
            <div style="color: var(--gold); font-size: 14px; margin-top: 10px; font-weight: bold;">🏆 TOP 5 SIRALAMA</div>
            <div id="rank-box" class="rank-list"></div>

            <button class="btn" onclick="hub.restart()">TEKRAR DENE</button>
            <button class="btn btn-gray" onclick="location.reload()">MENÜYE DÖN</button>
        </div>
    </div>

    <script>
        const hub = {
            active: false, mode: '', score: 0,
            
            login() {
                const n = document.getElementById("nick").value.trim();
                if(!n) return;
                localStorage.setItem("f_user", n);
                this.showLobby();
            },

            showLobby() {
                document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
                document.getElementById("scr-lobby").classList.remove('hidden');
                document.getElementById("u-display").innerText = localStorage.getItem("f_user").toUpperCase();
            },

            clear() { localStorage.clear(); location.reload(); },

            start(m) {
                this.mode = m; this.score = 0; this.active = true;
                document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
                document.getElementById("scr-game").classList.remove('hidden');
                document.getElementById("val-now").innerText = "0";
                
                if(m === 'snake') {
                    document.getElementById("snake-ui").classList.remove("hidden");
                    this.initSnake();
                } else {
                    document.getElementById("snake-ui").classList.add("hidden");
                    this.initBird();
                }
            },

            restart() {
                document.getElementById("scoreboard").classList.add("hidden");
                this.start(this.mode);
            },

            endGame() {
                this.active = false;
                // Skor Kaydetme
                let list = JSON.parse(localStorage.getItem("best_" + this.mode) || "[]");
                list.push(this.score);
                list.sort((a, b) => b - a);
                list = list.slice(0, 5);
                localStorage.setItem("best_" + this.mode, JSON.stringify(list));

                // Sıralama Tablosu Oluşturma
                const box = document.getElementById("rank-box");
                box.innerHTML = "";
                list.forEach((s, i) => {
                    box.innerHTML += `<div class="rank-item ${i===0?'top':''}">
                        <span>#${i+1} REKOR</span>
                        <span>${s}</span>
                    </div>`;
                });

                document.getElementById("val-final").innerText = this.score;
                document.getElementById("scoreboard").classList.remove("hidden");
            },

            // --- NEON SNAKE MOTORU ---
            initSnake() {
                const cv = document.getElementById("gameCanvas"); cv.width = 400; cv.height = 400;
                const cx = cv.getContext("2d");
                let sn = [{x:200,y:200},{x:180,y:200}], ap = {x:100,y:100}, d = "RIGHT", nD = "RIGHT";

                const setDir = (dir) => { if(dir=="UP"&&d!="DOWN")nD="UP"; if(dir=="DOWN"&&d!="UP")nD="DOWN"; if(dir=="LEFT"&&d!="RIGHT")nD="LEFT"; if(dir=="RIGHT"&&d!="LEFT")nD="RIGHT"; };
                document.getElementById("up").onclick = () => setDir("UP"); document.getElementById("down").onclick = () => setDir("DOWN");
                document.getElementById("left").onclick = () => setDir("LEFT"); document.getElementById("right").onclick = () => setDir("RIGHT");
                window.onkeydown = (e) => { if(e.key.includes("Arrow")) setDir(e.key.replace("Arrow","").toUpperCase()); };

                const sTimer = setInterval(() => {
                    if(!this.active) { clearInterval(sTimer); return; }
                    d = nD; cx.fillStyle = "#000"; cx.fillRect(0,0,400,400);
                    cx.fillStyle = "red"; cx.shadowBlur = 10; cx.shadowColor = "red"; cx.fillRect(ap.x, ap.y, 18, 18); cx.shadowBlur = 0;
                    sn.forEach((p,i) => { cx.fillStyle = i==0? "#00ff96":"#00a1ff"; cx.fillRect(p.x, p.y, 18, 18); });
                    let hX = sn[0].x, hY = sn[0].y;
                    if(d=="UP")hY-=20; if(d=="DOWN")hY+=20; if(d=="LEFT")hX-=20; if(d=="RIGHT")hX+=20;
                    if(hX==ap.x && hY==ap.y) { this.score+=10; document.getElementById("val-now").innerText = this.score; ap={x:Math.floor(Math.random()*19)*20, y:Math.floor(Math.random()*19)*20}; } else { sn.pop(); }
                    let nH = {x:hX, y:hY};
                    if(hX<0||hX>=400||hY<0||hY>=400||sn.some(p=>p.x==nH.x&&p.y==nH.y)) { clearInterval(sTimer); this.endGame(); } else { sn.unshift(nH); }
                }, 130);
            },

            // --- NEON BIRD MOTORU ---
            initBird() {
                const cv = document.getElementById("gameCanvas"); cv.width = 320; cv.height = 480;
                const cx = cv.getContext("2d");
                let bY = 200, bV = 0, pipes = [];

                const fly = () => { if(this.active) bV = -7; };
                window.onmousedown = fly; window.ontouchstart = (e) => { fly(); e.preventDefault(); };
                window.onkeydown = (e) => { if(e.key==" ") fly(); };

                const bLoop = () => {
                    if(!this.active) return;
                    cx.fillStyle = "#000"; cx.fillRect(0,0,320,480);
                    bV += 0.4; bY += bV;
                    cx.fillStyle = "yellow"; cx.shadowBlur = 15; cx.shadowColor = "yellow"; cx.beginPath(); cx.arc(50, bY, 12, 0, Math.PI*2); cx.fill(); cx.shadowBlur = 0;
                    if(pipes.length==0 || pipes[pipes.length-1].x < 160) pipes.push({x:320, h:Math.random()*200+50, g:140});
                    for(let i=pipes.length-1; i>=0; i--) {
                        let p = pipes[i]; p.x -= 3;
                        cx.fillStyle = "#00f2ea"; cx.fillRect(p.x, 0, 50, p.h); cx.fillRect(p.x, p.h+p.gap, 50, 480);
                        if(50+10>p.x && 50-10<p.x+50 && (bY-10<p.h || bY+10>p.h+p.gap)) this.active = false;
                        if(p.x == 50) { this.score++; document.getElementById("val-now").innerText = this.score; }
                        if(p.x < -60) pipes.splice(i,1);
                    }
                    if(bY>480 || bY<0) this.active = false;
                    if(!this.active) { this.endGame(); } else { requestAnimationFrame(bLoop); }
                };
                bLoop();
            }
        };

        if(localStorage.getItem("f_user")) hub.showLobby();
    </script>
</body>
</html>
