<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yılan Pro - Rekabet Modu</title>
    <style>
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body { 
            background: linear-gradient(-45deg, #0a0a12, #1a0f2e, #0a1622);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; color: white; font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; touch-action: none; height: 100vh;
        }

        /* GİRİŞ VE OYUN BİTTİ EKRANLARI */
        .overlay {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        
        #game-over-screen { display: none; background: rgba(20, 0, 0, 0.85); }

        input { padding: 12px; border-radius: 8px; border: 2px solid #00ff96; background: #111; color: white; margin-bottom: 15px; width: 200px; text-align: center; }
        .btn-ui { padding: 12px 30px; background: #00ff96; color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* SKOR TABLOSU */
        #leaderboard {
            position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7);
            border: 2px solid #00f2ea; padding: 10px; border-radius: 8px; font-size: 13px;
            min-width: 140px; z-index: 50;
        }
        #leaderboard h3 { margin: 0 0 5px 0; color: #00f2ea; font-size: 14px; text-align: center; border-bottom: 1px solid #00f2ea; }
        .score-row { display: flex; justify-content: space-between; margin: 3px 0; }
        .score-row span:last-child { color: #00ff96; font-weight: bold; }

        #game-container { display: none; flex-direction: column; align-items: center; }
        #skor-panel { font-size: 24px; font-weight: bold; color: #00ff96; margin-bottom: 10px; }

        canvas { border: 3px solid #333; border-radius: 12px; background: #000; max-width: 85vw; max-height: 40vh; }

        /* KONTROLLER */
        .controls { display: grid; grid-template-columns: repeat(3, 75px); grid-template-rows: repeat(2, 75px); gap: 10px; margin-top: 20px; }
        .btn-game { background: #222; color: #00f2ea; border: 2px solid #00f2ea; border-radius: 15px; font-size: 30px; display: flex; align-items: center; justify-content: center; }
        .btn-game:active { background: #00f2ea; color: black; }
        #up { grid-column: 2; }
        #left { grid-column: 1; grid-row: 2; }
        #down { grid-column: 2; grid-row: 2; }
        #right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

    <div id="login-screen" class="overlay">
        <h1 style="color: #00ff96;">YILAN PRO</h1>
        <input type="text" id="username" placeholder="Adını Yaz..." maxlength="10">
        <button class="btn-ui" onclick="startGame()">BAŞLA</button>
    </div>

    <div id="game-over-screen" class="overlay">
        <h1 style="color: #ff0050;">OYUN BİTTİ!</h1>
        <p id="final-score-text" style="font-size: 20px;"></p>
        <button class="btn-ui" onclick="resetGame()">TEKRAR DENE</button>
        <button class="btn-ui" onclick="location.reload()" style="margin-top:10px; background:#555; color:white;">İSİM DEĞİŞTİR</button>
    </div>

    <div id="leaderboard">
        <h3>🏆 EN İYİLER</h3>
        <div id="score-list"></div>
    </div>

    <div id="game-container">
        <div id="skor-panel"><span id="user-display"></span>: <span id="skor-val">0</span></div>
        <canvas id="snakeBoard" width="400" height="400"></canvas>
        <div class="controls">
            <div class="btn-game" id="up">↑</div>
            <div class="btn-game" id="left">←</div>
            <div class="btn-game" id="down">↓</div>
            <div class="btn-game" id="right">→</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("snakeBoard");
        const ctx = canvas.getContext("2d");
        const grid = 20;
        let score = 0, snake = [], apple = {}, d = "RIGHT", nextD = "RIGHT", currentSpeed = 200;
        let playerName = "Oyuncu", gameRunning = false, loopTimeout;

        function updateLeaderboard() {
            let scores = JSON.parse(localStorage.getItem("furkanSnakeV3") || "[]");
            scores.sort((a, b) => b.score - a.score);
            document.getElementById("score-list").innerHTML = scores.slice(0, 5).map(s => 
                `<div class="score-row"><span>${s.name}</span><span>${s.score}</span></div>`
            ).join("");
        }

        function saveScore() {
            let scores = JSON.parse(localStorage.getItem("furkanSnakeV3") || "[]");
            scores.push({ name: playerName, score: score });
            localStorage.setItem("furkanSnakeV3", JSON.stringify(scores));
            updateLeaderboard();
        }

        function startGame() {
            const input = document.getElementById("username").value.trim();
            if(input) playerName = input;
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("game-container").style.display = "flex";
            document.getElementById("user-display").innerText = playerName;
            resetGame();
        }

        function resetGame() {
            score = 0;
            currentSpeed = 200;
            d = "RIGHT"; nextD = "RIGHT";
            snake = [{x: 200, y: 200}, {x: 180, y: 200}];
            apple = { x: 100, y: 100 };
            document.getElementById("skor-val").innerText = "0";
            document.getElementById("game-over-screen").style.display = "none";
            gameRunning = true;
            updateLeaderboard();
            clearTimeout(loopTimeout);
            gameLoop();
        }

        function gameLoop() {
            if(!gameRunning) return;
            d = nextD;
            ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Elma
            ctx.fillStyle = "#ff0050"; ctx.fillRect(apple.x, apple.y, grid-2, grid-2);

            // Yılan
            snake.forEach((part, index) => {
                ctx.fillStyle = (index === 0) ? "#00ff96" : "#00a1ff";
                ctx.fillRect(part.x, part.y, grid-2, grid-2);
            });

            let headX = snake[0].x; let headY = snake[0].y;
            if(d == "LEFT") headX -= grid; if(d == "UP") headY -= grid;
            if(d == "RIGHT") headX += grid; if(d == "DOWN") headY += grid;

            if(headX == apple.x && headY == apple.y) {
                score += 10;
                if(currentSpeed > 60) currentSpeed -= 7;
                document.getElementById("skor-val").innerText = score;
                apple = { x: Math.floor(Math.random() * 19) * grid, y: Math.floor(Math.random() * 19) * grid };
            } else { snake.pop(); }

            let newHead = { x: headX, y: headY };

            if(headX < 0 || headX >= canvas.width || headY < 0 || headY >= canvas.height || snake.some(p => p.x === newHead.x && p.y === newHead.y)) {
                gameOver();
            } else {
                snake.unshift(newHead);
                loopTimeout = setTimeout(gameLoop, currentSpeed);
            }
        }

        function gameOver() {
            gameRunning = false;
            saveScore();
            document.getElementById("final-score-text").innerText = playerName + ", Skorun: " + score;
            document.getElementById("game-over-screen").style.display = "flex";
        }

        function changeDir(v) {
            if(v=="UP" && d!="DOWN") nextD="UP"; if(v=="DOWN" && d!="UP") nextD="DOWN";
            if(v=="LEFT" && d!="RIGHT") nextD="LEFT"; if(v=="RIGHT" && d!="LEFT") nextD="RIGHT";
        }

        document.addEventListener("keydown", (e) => {
            if(e.key.includes("Arrow")) changeDir(e.key.replace("Arrow","").toUpperCase());
        });

        ["up","down","left","right"].forEach(id => {
            const btn = document.getElementById(id);
            btn.addEventListener("touchstart", (e) => { e.preventDefault(); changeDir(id.toUpperCase()); });
            btn.addEventListener("mousedown", () => changeDir(id.toUpperCase()));
        });

        updateLeaderboard();
    </script>
</body>
</html>
