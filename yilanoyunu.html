<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Furkan Hub v10 - Kesintisiz Eğlence</title>
    <style>
        :root { --neon: #00ff96; --rose: #ff0050; --cyber: #00f2ea; --gold: #ffd700; }
        * { box-sizing: border-box; touch-action: manipulation; user-select: none; outline: none; }
        body { background: #000; margin: 0; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        /* ANA EKRAN YAPISI */
        .screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; visibility: visible; }
        .hidden { display: none !important; }

        /* ARAYÜZ ELEMANLARI */
        .panel { background: #111; padding: 25px; border-radius: 25px; border: 3px solid var(--neon); text-align: center; width: 330px; box-shadow: 0 0 30px rgba(0,255,150,0.2); }
        .title { font-size: 34px; font-weight: 900; color: var(--neon); text-shadow: 0 0 15px var(--neon); margin-bottom: 20px; letter-spacing: 2px; }
        input { padding: 15px; border: 2px solid var(--neon); background: #000; color: #fff; border-radius: 12px; width: 100%; text-align: center; margin-bottom: 15px; font-size: 18px; }
        
        .btn { padding: 15px; background: var(--neon); color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 18px; margin: 6px 0; transition: 0.2s; }
        .btn:active { transform: scale(0.96); }
        .btn-gray { background: #222; color: #888; border: 1px solid #444; }
        .btn-red { background: var(--rose); color: white; }

        /* SIRALAMA TABLOSU TASARIMI */
        #scoreboard { z-index: 9999; background: rgba(0,0,0,0.97); }
        .rank-list { background: #050505; border-radius: 15px; padding: 12px; margin: 15px 0; border: 1px solid #333; }
        .rank-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #111; font-size: 14px; }
        .rank-item:last-child { border: none; }
        .rank-item.top { color: var(--gold); font-weight: bold; border-left: 3px solid var(--gold); padding-left: 15px; }

        /* OYUN ALANI VE SKOR */
        canvas { border: 2px solid #333; background: #000; border-radius: 20px; max-width: 92vw; box-shadow: 0 0 20px rgba(255,255,255,0.05); }
        .live-score { font-size: 28px; color: var(--neon); margin-bottom: 12px; font-weight: bold; text-shadow: 0 0 10px var(--neon); }

        /* JOYSTICK (SNAKE İÇİN) */
        .joy { display: grid; grid-template-columns: repeat(3, 75px); gap: 12px; margin-top: 25px; }
        .j-btn { background: #151515; border: 2px solid var(--cyber); border-radius: 18px; height: 75px; display: flex; align-items: center; justify-content: center; font-size: 32px; color: var(--cyber); box-shadow: 0 4px 0 var(--cyber); }
        .j-btn:active { transform: translateY(4px); box-shadow: none; }
        #up { grid-column: 2; } #left { grid-column: 1; grid-row: 2; } #down { grid-column: 2; grid-row: 2; } #right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

    <div id="scr-login" class="screen">
        <div class="panel">
            <div class="title">NEON HUB</div>
            <input type="text" id="nick" placeholder="ADINIZI YAZIN" maxlength="15">
            <button class="btn" onclick="hub.login()">BAŞLAT</button>
        </div>
    </div>

    <div id="scr-lobby" class="screen hidden">
        <div class="title" style="font-size: 22px;">HOŞ GELDİN <span id="u-display" style="color:var(--cyber)"></span></div>
        <div class="panel" style="border-color: var(--cyber);">
            <button class="btn" onclick="hub.start('snake')">🐍 NEON SNAKE</button>
            <button class="btn" onclick="hub.start('bird')">🐦 NEON BIRD</button>
            <button class="btn btn-gray" style="margin-top:20px; font-size:14px;" onclick="hub.resetAll()">VERİLERİ TEMİZLE</button>
        </div>
    </div>

    <div id="scr-game" class="screen hidden">
        <div class="live-score">PUAN: <span id="val-now">0</span></div>
        <canvas id="gameCanvas"></canvas>
        
        <div id="snake-ui" class="joy hidden">
            <div class="j-btn" id="up">↑</div><div class="j-btn" id="left">←</div>
            <div class="j-btn" id="down">↓</div><div class="j-btn" id="right">→</div>
        </div>

        <button class="btn btn-gray" style="width:140px; font-size:14px; margin-top:25px;" onclick="location.reload()">ANA MENÜ</button>
    </div>

    <div id="scoreboard" class="screen hidden">
        <div class="panel" style="border-color: var(--rose);">
            <div class="title" style="color:var(--rose);">ÖLDÜN!</div>
            <div style="font-size: 14px; color: #888;">TUR SKORUN</div>
            <div style="font-size: 60px; font-weight: 900; margin: 5px 0;" id="val-final">0</div>
            
            <div style="color: var(--gold); font-size: 14px; margin-top: 15px; font-weight: bold; letter-spacing: 1px;">🏆 EN İYİ 5 SKORUN</div>
            <div id="rank-box" class="rank-list"></div>

            <button class="btn" onclick="hub.restart()">BİR DAHA DENE</button>
            <button class="btn btn-gray" onclick="location.reload()">MENÜYE DÖN</button>
        </div>
    </div>

    <script>
        const hub = {
            active: false, mode: '', score: 0,
            
            login() {
                const n = document.getElementById("nick").value.trim();
                if(!n) return;
                localStorage.setItem("f_user_name", n);
                this.showLobby();
            },

            showLobby() {
                document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
                document.getElementById("scr-lobby").classList.remove('hidden');
                document.getElementById("u-display").innerText = localStorage.getItem("f_user_name").toUpperCase();
            },

            resetAll() { localStorage.clear(); location.reload(); },

            start(m) {
                this.mode = m; this.score = 0; this.active = true;
                document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
                document.getElementById("scr-game").classList.remove('hidden');
                document.getElementById("val-now").innerText = "0";
                
                if(m === 'snake') {
                    document.getElementById("snake-ui").classList.remove("hidden");
                    this.initSnake();
                } else {
                    document.getElementById("snake-ui").classList.add("hidden");
                    this.initBird();
                }
            },

            restart() {
                document.getElementById("scoreboard").classList.add("hidden");
                this.start(this.mode);
            },

            finishGame() {
                this.active = false;
                let key = "best_scores_" + this.mode;
                let list = JSON.parse(localStorage.getItem(key) || "[]");
                list.push(this.score);
                list.sort((a, b) => b - a);
                list = list.slice(0, 5);
                localStorage.setItem(key, JSON.stringify(list));

                const box = document.getElementById("rank-box");
                box.innerHTML = "";
                list.forEach((s, i) => {
                    box.innerHTML += `<div class="rank-item ${i===0?'top':''}">
                        <span>#${i+1} REKOR</span>
                        <span>${s} PUAN</span>
                    </div>`;
                });

                document.getElementById("val-final").innerText = this.score;
                document.getElementById("scoreboard").classList.remove("hidden");
            },

            // --- YILAN MODU ---
            initSnake() {
                const cv = document.getElementById("gameCanvas"); cv.width = 400; cv.height = 400;
                const cx = cv.getContext("2d");
                let snake = [{x:200,y:200},{x:180,y:200}], apple = {x:100,y:100}, dir = "RIGHT", nextDir = "RIGHT";

                const handleDir = (d) => {
                    if(d=="UP" && dir!="DOWN") nextDir="UP";
                    if(d=="DOWN" && dir!="UP") nextDir="DOWN";
                    if(d=="LEFT" && dir!="RIGHT") nextDir="LEFT";
                    if(d=="RIGHT" && dir!="LEFT") nextDir="RIGHT";
                };

                document.getElementById("up").onclick = () => handleDir("UP");
                document.getElementById("down").onclick = () => handleDir("DOWN");
                document.getElementById("left").onclick = () => handleDir("LEFT");
                document.getElementById("right").onclick = () => handleDir("RIGHT");
                window.onkeydown = (e) => { if(e.key.includes("Arrow")) handleDir(e.key.replace("Arrow","").toUpperCase()); };

                const sLoop = setInterval(() => {
                    if(!this.active) { clearInterval(sLoop); return; }
                    dir = nextDir;
                    cx.fillStyle = "#000"; cx.fillRect(0,0,400,400);
                    
                    // Elma
                    cx.fillStyle = "#ff0050"; cx.shadowBlur = 10; cx.shadowColor = "#ff0050";
                    cx.fillRect(apple.x+2, apple.y+2, 16, 16); cx.shadowBlur = 0;

                    // Yılan
                    snake.forEach((p, i) => {
                        cx.fillStyle = i === 0 ? "#00ff96" : "#00a1ff";
                        cx.fillRect(p.x, p.y, 18, 18);
                    });

                    let headX = snake[0].x, headY = snake[0].y;
                    if(dir === "UP") headY -= 20; if(dir === "DOWN") headY += 20;
                    if(dir === "LEFT") headX -= 20; if(dir === "RIGHT") headX += 20;

                    if(headX === apple.x && headY === apple.y) {
                        this.score += 10; document.getElementById("val-now").innerText = this.score;
                        apple = { x: Math.floor(Math.random()*19)*20, y: Math.floor(Math.random()*19)*20 };
                    } else { snake.pop(); }

                    let newHead = {x:headX, y:headY};
                    if(headX < 0 || headX >= 400 || headY < 0 || headY >= 400 || snake.some(p => p.x === newHead.x && p.y === newHead.y)) {
                        clearInterval(sLoop); this.finishGame();
                    } else { snake.unshift(newHead); }
                }, 140);
            },

            // --- KUŞ MODU ---
            initBird() {
                const cv = document.getElementById("gameCanvas"); cv.width = 320; cv.height = 480;
                const cx = cv.getContext("2d");
                let birdY = 240, birdV = 0, pipes = [];
                const grav = 0.22, jump = -5.2;

                const doJump = () => { if(this.active) birdV = jump; };
                window.onmousedown = doJump; 
                window.ontouchstart = (e) => { doJump(); e.preventDefault(); };
                window.onkeydown = (e) => { if(e.key === " ") doJump(); };

                const bLoop = () => {
                    if(!this.active) return;
                    cx.fillStyle = "#000"; cx.fillRect(0,0,320,480);
                    
                    birdV += grav; birdY += birdV;
                    cx.fillStyle = "#ffd700"; cx.shadowBlur = 15; cx.shadowColor = "#ffd700";
                    cx.beginPath(); cx.arc(60, birdY, 12, 0, Math.PI*2); cx.fill(); cx.shadowBlur = 0;

                    if(pipes.length === 0 || pipes[pipes.length-1].x < 170) {
                        pipes.push({ x: 320, h: Math.random()*200+60, g: 155, passed: false });
                    }

                    for(let i = pipes.length-1; i >= 0; i--) {
                        let p = pipes[i]; p.x -= 2.4;
                        cx.fillStyle = "#00f2ea";
                        cx.fillRect(p.x, 0, 50, p.h); 
                        cx.fillRect(p.x, p.h + p.g, 50, 480);

                        if(60+10 > p.x && 60-10 < p.x+50 && (birdY-10 < p.h || birdY+10 > p.h+p.g)) this.active = false;
                        if(p.x < 60 && !p.passed) { p.passed = true; this.score++; document.getElementById("val-now").innerText = this.score; }
                        if(p.x < -60) pipes.splice(i, 1);
                    }

                    if(birdY > 480 || birdY < 0) this.active = false;
                    if(!this.active) this.finishGame(); else requestAnimationFrame(bLoop);
                };
                bLoop();
            }
        };

        if(localStorage.getItem("f_user_name")) hub.showLobby();
    </script>
</body>
</html>
