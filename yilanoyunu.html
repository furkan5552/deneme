<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Furkan Game Hub - Ultra Pro</title>
    <style>
        :root {
            --neon-green: #00ff96;
            --neon-blue: #00f2ea;
            --neon-pink: #ff0050;
            --bg-dark: #050505;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: var(--bg-dark); margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: white; overflow: hidden; display: flex; flex-direction: column; 
            align-items: center; height: 100vh;
        }

        /* --- EKRAN GEÇİŞLERİ --- */
        .screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; z-index: 100; background: var(--bg-dark);
            transition: opacity 0.4s ease;
        }
        .hidden { display: none !important; opacity: 0; }

        /* --- GİRİŞ VE LOBİ --- */
        .logo-main { font-size: 48px; font-weight: 900; color: var(--neon-green); text-shadow: 0 0 20px rgba(0,255,150,0.6); margin-bottom: 25px; letter-spacing: 2px; }
        .input-box { 
            padding: 18px; border-radius: 12px; border: 2px solid var(--neon-green); 
            background: #111; color: white; width: 280px; text-align: center; 
            font-size: 18px; margin-bottom: 20px; transition: 0.3s;
        }
        .input-box:focus { box-shadow: 0 0 15px var(--neon-green); }
        .btn-start { 
            padding: 18px 45px; border: none; border-radius: 12px; font-weight: bold; 
            cursor: pointer; background: var(--neon-green); color: black; 
            font-size: 20px; transition: 0.3s; width: 280px;
        }
        .btn-start:hover { transform: scale(1.05); box-shadow: 0 0 25px var(--neon-green); }

        .game-selection { display: flex; flex-direction: column; gap: 20px; padding: 20px; }
        .game-card { 
            width: 300px; padding: 35px; background: #0f0f0f; border: 2px solid #222; 
            border-radius: 20px; cursor: pointer; transition: 0.4s; text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .game-card:hover { border-color: var(--neon-blue); transform: translateY(-8px); background: #151515; }
        .game-card h3 { color: var(--neon-blue); margin: 0; font-size: 26px; text-shadow: 0 0 10px var(--neon-blue); }
        .game-card p { color: #777; font-size: 14px; margin-top: 12px; font-weight: 500; }

        /* --- OYUN ALANLARI --- */
        canvas { 
            border: 3px solid #222; background: #000; border-radius: 18px; 
            max-width: 95vw; box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }
        .score-panel { 
            font-size: 32px; font-weight: 800; color: var(--neon-green); 
            margin-bottom: 20px; text-shadow: 0 0 15px var(--neon-green);
        }

        /* --- MOBİL JOYSTICK (EN ALTTA) --- */
        .controls-layer { 
            position: fixed; bottom: 40px; display: grid; 
            grid-template-columns: repeat(3, 85px); grid-template-rows: repeat(2, 85px); 
            gap: 15px; z-index: 200;
        }
        .joy { 
            background: rgba(25, 25, 25, 0.9); border: 2px solid var(--neon-blue); 
            border-radius: 20px; display: flex; align-items: center; 
            justify-content: center; font-size: 35px; color: var(--neon-blue); 
            box-shadow: 0 6px 0 #00817d; transition: 0.1s;
        }
        .joy:active { transform: translateY(4px); box-shadow: none; background: var(--neon-blue); color: black; }
        #up-j { grid-column: 2; }
        #left-j { grid-column: 1; grid-row: 2; }
        #down-j { grid-column: 2; grid-row: 2; }
        #right-j { grid-column: 3; grid-row: 2; }

        .btn-exit { 
            position: fixed; top: 20px; left: 20px; padding: 12px 25px; 
            background: #222; border: 1px solid #444; color: white; 
            border-radius: 12px; cursor: pointer; z-index: 300; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="scr-login" class="screen">
        <div class="logo-main">NEON HUB</div>
        <input type="text" id="user-in" class="input-box" placeholder="OYUNCU ADI" maxlength="10">
        <button class="btn-start" onclick="saveUser()">BAŞLAT</button>
    </div>

    <div id="scr-lobby" class="screen hidden">
        <div style="font-size: 20px; color: #888; margin-bottom: 10px;">HOŞ GELDİN PİLOT</div>
        <div id="display-nick" style="font-size: 32px; font-weight: bold; margin-bottom: 40px; color: var(--neon-pink);"></div>
        <div class="game-selection">
            <div class="game-card" onclick="startSnakeGame()">
                <h3>🐍 NEON SNAKE</h3>
                <p>Hızlandıkça uzayan macera.</p>
            </div>
            <div class="game-card" onclick="startBirdGame()">
                <h3>🐦
