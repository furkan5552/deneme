<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Furkan Hub - Pro</title>
    <style>
        :root { --neon: #00ff96; --cyber: #00f2ea; --rose: #ff0050; }
        * { box-sizing: border-box; touch-action: manipulation; user-select: none; }
        body { background: #050505; margin: 0; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        .screen { position: fixed; inset: 0; background: #050505; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .hidden { display: none !important; }

        /* Modern Panel */
        .panel { background: rgba(20,20,20,0.95); padding: 30px; border-radius: 20px; border: 2px solid var(--neon); text-align: center; box-shadow: 0 0 30px rgba(0,255,150,0.2); }
        .title { font-size: 36px; font-weight: 900; color: var(--neon); text-shadow: 0 0 15px var(--neon); margin-bottom: 20px; }
        
        input { padding: 15px; border: 2px solid var(--neon); background: #111; color: #fff; border-radius: 12px; width: 260px; text-align: center; margin-bottom: 15px; font-size: 18px; outline: none; }
        .btn { padding: 15px 30px; background: var(--neon); color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; width: 240px; font-size: 18px; transition: 0.2s; margin: 5px; }
        .btn:active { transform: scale(0.95); }
        .btn-gray { background: #333; color: white; }

        /* Game Over Ekranı */
        #game-over { z-index: 100; background: rgba(0,0,0,0.9); }

        /* Oyun Görünümü */
        .game-area { position: relative; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 2px solid #222; background: #000; border-radius: 15px; max-width: 95vw; }
        .score-tag { font-size: 28px; color: var(--neon); margin-bottom: 10px; font-weight: bold; }

        /* Mobil Kontroller */
        .joy { margin-top: 20px; display: grid; grid-template-columns: repeat(3, 75px); grid-template-rows: repeat(2, 75px); gap: 10px; }
        .j-btn { background: #1a1a1a; border: 2px solid var(--cyber); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 30px; color: var(--cyber); }
        #up { grid-column: 2; } #left { grid-column: 1; grid-row: 2; } #down { grid-column: 2; grid-row: 2; } #right { grid-column: 3; grid-row: 2; }
        
        .card { width: 280px; padding: 25px; margin: 10px; background: #111; border: 2px solid #333; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--neon); }
    </style>
</head>
<body>

    <div id="scr-login" class="screen">
        <div class="panel">
            <div class="title">GAME HUB</div>
            <input type="text" id="nick" placeholder="İSİM YAZ">
            <button class="btn" onclick="app.login()">GİRİŞ</button>
        </div>
    </div>

    <div id="scr-lobby" class="screen hidden">
        <div class="title" style="font-size: 22px;">HOŞGELDİN <span id="user-display"></span></div>
        <div class="card" onclick="app.start('snake')"><h3>🐍 NEON SNAKE</h3></div>
        <div class="card" onclick="app.start('bird')"><h3>🐦 CYBER BIRD</h3></div>
        <button style="margin-top:20px; color:gray; background:none; border:none; text-decoration:underline;" onclick="localStorage.clear();location.reload()">Sıfırla</button>
    </div>

    <div id="scr-game" class="screen hidden">
        <div class="game-area">
            <div class="score-tag">SKOR: <span id="current-score">0</span></div>
            <canvas id="mainCanvas"></canvas>
            
            <div id="snake-ctrl" class="joy hidden">
                <div class="j-btn" id="up">↑</div>
                <div class="j-btn" id="left">←</div>
                <div class="j-btn" id="down">↓</div>
                <div class="j-btn" id="right">→</div>
            </div>
        </div>
    </div>

    <div id="game-over" class="screen hidden">
        <div class="panel" style="border-color: var(--rose);">
            <div class="title" style="color: var(--rose); text-shadow: 0 0 15px var(--rose);">ÖLDÜN!</div>
            <div style="font-size: 24px; margin-bottom: 20px;">SKORUN: <span id="final-score">0</span></div>
            <button class="btn" onclick="app.restart()">TEKRAR DENE</button>
            <button class="btn btn-gray" onclick="location.reload()">MENÜYE DÖN</button>
        </div>
    </div>

    <script>
        const app = {
            state: { user: localStorage.getItem("u"), game: null, score: 0, active: false },
            
            login() {
                const n = document.getElementById("nick").value;
                if(!n) return;
                localStorage.setItem("u", n);
                this.state.user = n;
                this.showLobby();
            },

            showLobby() {
                document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
                document.getElementById("scr-lobby").classList.remove('hidden');
                document.getElementById("user-display").innerText = this.state.user.toUpperCase();
            },

            start(gameName) {
                this.state.game = gameName;
                this.state.score = 0;
                this.state.active = true;
                document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
                document.getElementById("scr-game").classList.remove('hidden');
                document.getElementById("current-score").innerText = "0";
                
                if(gameName === 'snake') {
                    document.getElementById("snake-ctrl").classList.remove('hidden');
                    this.initSnake();
                } else {
                    document.getElementById("snake-ctrl").classList.add('hidden');
                    this.initBird();
                }
            },

            gameOver() {
                this.state.active = false;
                document.getElementById("game-over").classList.remove('hidden');
                document.getElementById("final-score").innerText = this.state.score;
            },

            restart() {
                document.getElementById("game-over").classList.add('hidden');
                this.start(this.state.game);
            },

            // --- YILAN MOTORU ---
            initSnake() {
                const cv = document.getElementById("mainCanvas");
                cv.width = 400; cv.height = 400;
                const cx = cv.getContext("2d");
                let sn = [{x:200,y:200},{x:180,y:200}], ap = {x:100,y:100}, d = "RIGHT", nD = "RIGHT";

                const move = (dir) => { if(dir=="UP"&&d!="DOWN")nD="UP"; if(dir=="DOWN"&&d!="UP")nD="DOWN"; if(dir=="LEFT"&&d!="RIGHT")nD="LEFT"; if(dir=="RIGHT"&&d!="LEFT")nD="RIGHT"; };
                document.getElementById("up").onclick = () => move("UP"); document.getElementById("down").onclick = () => move("DOWN");
                document.getElementById("left").onclick = () => move("LEFT"); document.getElementById("right").onclick = () => move("RIGHT");
                window.onkeydown = (e) => { if(e.key.includes("Arrow")) move(e.key.replace("Arrow","").toUpperCase()); };

                const loop = setInterval(() => {
                    if(!this.state.active) { clearInterval(loop); return; }
                    d = nD;
                    cx.fillStyle = "#000"; cx.fillRect(0,0,400,400);
                    cx.fillStyle = "red"; cx.fillRect(ap.x, ap.y, 18, 18);
                    sn.forEach((p,i) => { cx.fillStyle = i==0? "#00ff96":"#00a1ff"; cx.fillRect(p.x, p.y, 18, 18); });
                    let hX = sn[0].x, hY = sn[0].y;
                    if(d=="UP")hY-=20; if(d=="DOWN")hY+=20; if(d=="LEFT")hX-=20; if(d=="RIGHT")hX+=20;
                    if(hX==ap.x && hY==ap.y) { this.state.score+=10; document.getElementById("current-score").innerText = this.state.score; ap={x:Math.floor(Math.random()*19)*20, y:Math.floor(Math.random()*19)*20}; } else { sn.pop(); }
                    let nH = {x:hX, y:hY};
                    if(hX<0||hX>=400||hY<0||hY>=400||sn.some(p=>p.x==nH.x&&p.y==nH.y)) { clearInterval(loop); this.gameOver(); } else { sn.unshift(nH); }
                }, 130);
            },

            // --- BIRD MOTORU ---
            initBird() {
                const cv = document.getElementById("mainCanvas");
                cv.width = 320; cv.height = 480;
                const cx = cv.getContext("2d");
                let bY = 200, bV = 0, pipes = [];

                const jump = () => { if(this.state.active) bV = -7; };
                window.onclick = jump; window.onkeydown = (e) => { if(e.key==" ") jump(); };

                const bLoop = () => {
                    if(!this.state.active) return;
                    cx.fillStyle = "#000"; cx.fillRect(0,0,320,480);
                    bV += 0.4; bY += bV;
                    cx.fillStyle = "yellow"; cx.beginPath(); cx.arc(50, bY, 12, 0, Math.PI*2); cx.fill();
                    if(pipes.length==0 || pipes[pipes.length-1].x < 160) pipes.push({x:320, h:Math.random()*200+50, g:140});
                    for(let i=pipes.length-1; i>=0; i--) {
                        let p = pipes[i]; p.x -= 3;
                        cx.fillStyle = "#00f2ea"; cx.fillRect(p.x, 0, 50, p.h); cx.fillRect(p.x, p.h+p.gap, 50, 480);
                        if(50+10>p.x && 50-10<p.x+50 && (bY-10<p.h || bY+10>p.h+p.gap)) this.state.active = false;
                        if(p.x == 50) { this.state.score++; document.getElementById("current-score").innerText = this.state.score; }
                        if(p.x < -60) pipes.splice(i,1);
                    }
                    if(bY>480 || bY<0) this.state.active = false;
                    if(!this.state.active) { this.gameOver(); } else { requestAnimationFrame(bLoop); }
                };
                bLoop();
            }
        };

        if(app.state.user) app.showLobby();
    </script>
</body>
</html>
