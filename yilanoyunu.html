<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* Oyunun Görünümü */
        body { 
            background: #111; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            color: white; 
            font-family: sans-serif; 
            overflow: hidden; 
            touch-action: none; /* Sayfa kaymasını engeller */
        }
        #skor { 
            font-size: 22px; 
            font-weight: bold; 
            color: #ff0050; 
            margin: 10px 0; 
        }
        canvas { 
            background: #000; 
            border: 2px solid #333; 
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(255, 0, 80, 0.2);
        }
        /* Mobil Kontrol Butonları */
        .controls { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            margin-top: 15px; 
        }
        .btn { 
            background: #222; 
            color: #fff; 
            border: 2px solid #ff0050; 
            padding: 20px; 
            font-size: 24px; 
            border-radius: 12px; 
            cursor: pointer;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        .btn:active { background: #ff0050; }
        #up { grid-column: 2; }
        #left { grid-column: 1; }
        #right { grid-column: 3; }
        #down { grid-column: 2; }
    </style>
</head>
<body>

    <div id="skor">SKOR: 0</div>
    <canvas id="snakeBoard" width="3
