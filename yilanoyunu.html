<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Furkan Game Hub - Mobil Pro</title>
    <style>
        :root { --neon-green: #00ff96; --neon-blue: #00f2ea; --neon-pink: #ff0050; }
        body { 
            background: #050505; margin: 0; font-family: sans-serif; 
            color: white; overflow: hidden; height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }
        .overlay { 
            position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        
        /* GİRİŞ VE MENÜ */
        #menu-screen { display: none; text-align: center; }
        .hub-title { font-size: 28px; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); margin-bottom: 20px; }
        .game-card {
            width: 260px; padding: 20px; margin: 10px; background: #111;
            border: 2px solid #333; border-radius: 15px; cursor: pointer;
        }
        input { padding: 15px; border-radius: 10px; border: 2px solid var(--neon-green); background: #000; color: white; width: 200px; text-align: center; margin-bottom: 10px; }
        .btn-ui { padding: 15px 30px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; width: 240px; }
        .btn-green { background: var(--neon-green); color: black; }
        .btn-gray { background: #333; color: white; margin-top: 15px; }

        /* OYUN ALANI */
        .game-container { display: none; flex-direction: column; align-items: center; width: 100%; height: 100%; padding-top: 20px; }
        canvas { border: 2px solid #222; background: #000; border-radius: 10px; max-width: 95vw; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        /* 🔥 TELEFON İÇİN EN ALTA SABİTLENEN KONTROLLER */
        .mobile-controls { 
            position: fixed; bottom: 30px; left: 0; width: 100%;
            display: grid; grid-template-columns: repeat(3, 80px); 
            grid-template-rows: repeat(2, 80px); gap: 15px; 
            justify-content: center; z-index: 50;
        }
        .btn-dir { 
            background: rgba(20, 20, 20, 0.9); color: var(--neon-blue); 
            border: 2px solid var(--neon-blue); border-radius: 20px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 30px; user-select: none; -webkit-tap-highlight-color: transparent;
            box-shadow: 0 4px 0 var(--neon-blue);
        }
        .btn-dir:active { transform: translateY(4px); box-shadow: none; }
        #s-up { grid-column: 2; }
        #s-left { grid-column: 1; grid-row: 2; }
        #s-down { grid-column: 2; grid-row: 2; }
        #s-right { grid-column: 3; grid-row: 2; }

        .score-box { font-size: 24px; font-weight: bold; color: var(--neon-green); margin-bottom: 10px; }
        .back-btn { position: fixed; top: 10px; right: 10px; padding: 10px; background: #333; border-radius: 5px; font-size: 12px; z-index: 60; border:none; color:white; }
    </style>
</head>
<body>

    <div id="login-screen" class="overlay">
        <h1 style="color: var(--neon-green);">GAME HUB</h1>
        <input type="text" id="username" placeholder="Oyuncu Adı" maxlength="10">
        <div id="error-msg" style="color:var(--neon-pink); font-size:14px; margin-bottom:10px;"></div>
        <button class="btn-ui btn-green" onclick="handleLogin()">GİRİŞ</button>
    </div>

    <div id="menu-screen" class="overlay">
        <h1 class="hub-title">SELAM, <span id="welcome-user"></span></h1>
        <div class="game-card" onclick="startSnake()">
            <h3 style="color:var(--neon-green)">🐍 YILAN</h3>
            <p>Klasik macera!</p>
        </div>
        <div class="game-card" onclick="startBird()">
            <h3 style="color:var(--neon-blue)">🐦 NEON BIRD</h3>
            <p>Ekrana dokun ve uç!</p>
        </div>
        <button class="btn-ui btn-gray" onclick="clearMyAccount()">HESABI SİL</button>
    </div>

    <div id="snake-container" class="game-container">
        <button class="back-btn" onclick="backToMenu()">MENÜ ☰</button>
        <div class="score-box">Skor: <span id="snake-score">0</span></div>
        <canvas id="snakeCanvas" width="400" height="400"></canvas>
        
        <div class="mobile-controls">
            <div class="btn-dir" id="s-up">↑</div>
            <div class="btn-dir" id="s-left">←</div>
            <div class="btn-dir" id="s-down">↓</div>
            <div class="btn-dir" id="s-right">→</div>
        </div>
    </div>

    <div id="bird-container" class="game-container">
        <button class="back-btn" onclick="backToMenu()">MENÜ ☰</button>
        <div class="score-box">Skor: <span id="bird-score">0</span></div>
        <canvas id="birdCanvas" width="320" height="480"></canvas>
        </div>

    <script>
        let playerName = "";
        let gameRunning = false;
        let birdRunning = false;

        const getScores = (key) => JSON.parse(localStorage.getItem(key) || "[]");
        const getMyAcc = () => localStorage.getItem("hubAccount");

        window.onload = () => { if(getMyAcc()) { playerName = getMyAcc(); showMenu(); } };

        function handleLogin() {
            const input = document.getElementById("username").value.trim();
            if(!input) return;
            playerName = input;
            localStorage.setItem("hubAccount", playerName);
            showMenu();
        }

        function showMenu() {
            document.querySelectorAll('.overlay, .game-container').forEach(el => el.style.display = 'none');
            document.getElementById("menu-screen").style.display = "flex";
            document.getElementById("welcome-user").innerText = playerName;
        }

        function backToMenu() { gameRunning = false; birdRunning = false; showMenu(); }
        function clearMyAccount() { if(confirm("Silinsin mi?")) { localStorage.clear(); location.reload(); } }

        // --- YILAN ---
        const sCanvas = document.getElementById("snakeCanvas"), sCtx = sCanvas.getContext("2d");
        let snake, apple, sDir, sNextDir, sScore;

        function startSnake() {
            document.getElementById("menu-screen").style.display = "none";
            document.getElementById("snake-container").style.display = "flex";
            sScore = 0; sDir = "RIGHT"; sNextDir = "RIGHT";
            snake = [{x:200, y:200}, {x:180, y:200}];
            apple = {x: 100, y:100};
            gameRunning = true; snakeLoop();
        }

        function snakeLoop() {
            if(!gameRunning) return;
            sDir = sNextDir;
            sCtx.fillStyle = "black"; sCtx.fillRect(0,0,400,400);
            sCtx.fillStyle = "red"; sCtx.fillRect(apple.x, apple.y, 18, 18);
            snake.forEach((p, i) => { sCtx.fillStyle = i===0 ? "#00ff96" : "#00a1ff"; sCtx.fillRect(p.x, p.y, 18, 18); });
            let hX = snake[0].x, hY = snake[0].y;
            if(sDir==="UP") hY-=20; if(sDir==="DOWN") hY+=20; if(sDir==="LEFT") hX-=20; if(sDir==="RIGHT") hX+=20;
            if(hX===apple.x && hY===apple.y) {
                sScore+=10; document.getElementById("snake-score").innerText = sScore;
                apple = {x: Math.floor(Math.random()*19)*20, y: Math.floor(Math.random()*19)*20};
            } else { snake.pop(); }
            let nH = {x:hX, y:hY};
            if(hX<0 || hX>=400 || hY<0 || hY>=400 || snake.some(p => p.x===nH.x && p.y===nH.y)) {
                alert("Yandın! Skor: " + sScore); startSnake();
            } else { snake.unshift(nH); setTimeout(snakeLoop, 150); }
        }

        // --- BIRD ---
        const bCanvas = document.getElementById("birdCanvas"), bCtx = bCanvas.getContext("2d");
        let birdY, birdV, pipes, bScore;

        function startBird() {
            document.getElementById("menu-screen").style.display = "none";
            document.getElementById("bird-container").style.display = "flex";
            birdY = 200; birdV = 0; pipes = []; bScore = 0; birdRunning = true;
            birdLoop();
        }

        function birdLoop() {
            if(!birdRunning) return;
            bCtx.fillStyle = "#050505"; bCtx.fillRect(0,0,320,480);
            birdV += 0.5; birdY += birdV;
            bCtx.fillStyle = "yellow"; bCtx.beginPath(); bCtx.arc(50, birdY, 12, 0, Math.PI*2); bCtx.fill();
            if(Date.now() % 120 < 20) pipes.push({x: 320, h: Math.random()*200 + 100});
            pipes.forEach(p => {
                p.x -= 3;
                bCtx.fillStyle = var(--neon-blue); // Hata düzeltme için string verelim
                bCtx.fillStyle = "#00f2ea";
                bCtx.fillRect(p.x, 0, 40, p.h); bCtx.fillRect(p.x, p.h+130, 40, 480);
                if(50 > p.x && 50 < p.x+40 && (birdY < p.h || birdY > p.h+130)) birdRunning = false;
                if(p.x === 50) { bScore++; document.getElementById("bird-score").innerText = bScore; }
            });
            pipes = pipes.filter(p => p.x > -40);
            if(birdY > 480 || birdY < 0) birdRunning = false;
            if(!birdRunning) { alert("Düştün! Skor: " + bScore); startBird(); }
            else requestAnimationFrame(birdLoop);
        }

        // KONTROLLER
        const setDir = (d) => {
            if(d==="UP" && sDir!=="DOWN") sNextDir="UP";
            if(d==="DOWN" && sDir!=="UP") sNextDir="DOWN";
            if(d==="LEFT" && sDir!=="RIGHT") sNextDir="LEFT";
            if(d==="RIGHT" && sDir!=="LEFT") sNextDir="RIGHT";
        };

        // Yılan Tuş Atamaları
        document.getElementById("s-up").ontouchstart = (e) => { e.preventDefault(); setDir("UP"); };
        document.getElementById("s-down").ontouchstart = (e) => { e.preventDefault(); setDir("DOWN"); };
        document.getElementById("s-left").ontouchstart = (e) => { e.preventDefault(); setDir("LEFT"); };
        document.getElementById("s-right").ontouchstart = (e) => { e.preventDefault(); setDir("RIGHT"); };
        
        // Mouse desteği (PC için)
        document.getElementById("s-up").onmousedown = () => setDir("UP");
        document.getElementById("s-down").onmousedown = () => setDir("DOWN");
        document.getElementById("s-left").onmousedown = () => setDir("LEFT");
        document.getElementById("s-right").onmousedown = () => setDir("RIGHT");

        // Bird Kontrolü (Tüm ekran)
        document.body.onclick = () => { if(birdRunning) birdV = -7; };
        document.body.ontouchstart = (e) => { if(birdRunning) { birdV = -7; e.preventDefault(); } };
        window.onkeydown = (e) => { 
            if(e.key === " ") birdV = -7; 
            if(e.key.includes("Arrow")) setDir(e.key.replace("Arrow","").toUpperCase());
        };
    </script>
</body>
</html>
