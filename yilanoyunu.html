<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yılan Pro - VIP Rekabet</title>
    <style>
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body { 
            background: linear-gradient(-45deg, #0a101e, #1a0f2e, #050505);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; color: white; font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; touch-action: none; height: 100vh;
        }

        .overlay {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.96);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        
        #game-over-screen, #leaderboard-modal { display: none; }

        .form-group { display: flex; flex-direction: column; align-items: center; }
        input { padding: 14px; border-radius: 10px; border: 2px solid #00ff96; background: #111; color: white; margin-bottom: 10px; width: 240px; text-align: center; font-size: 17px; outline: none; }
        #error-msg { color: #ff0050; font-size: 14px; margin-bottom: 10px; height: 20px; font-weight: bold; }

        .btn-ui { 
            padding: 14px; border: none; border-radius: 10px; font-weight: bold; 
            cursor: pointer; font-size: 16px; width: 240px; margin: 6px 0; transition: 0.3s;
        }
        .btn-green { background: #00ff96; color: black; box-shadow: 0 4px 15px rgba(0, 255, 150, 0.3); }
        .btn-blue { background: #00f2ea; color: black; }
        .btn-gray { background: #333; color: white; }
        .btn-ui:active { transform: scale(0.95); }

        /* MODAL */
        .modal-content { 
            width: 85%; max-width: 320px; background: #0a0a0a; border: 2px solid #00f2ea; 
            padding: 25px; border-radius: 20px; box-shadow: 0 0 40px rgba(0, 242, 234, 0.2);
        }
        .modal-content h2 { color: #00f2ea; text-align: center; margin-top: 0; font-size: 22px; }
        .score-list-full { margin: 15px 0; max-height: 200px; overflow-y: auto; padding-right: 5px; }
        .full-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1a1a1a; }
        .full-row span:last-child { color: #00ff96; font-weight: bold; }

        /* OYUN */
        #game-container { display: none; flex-direction: column; align-items: center; }
        #skor-panel { font-size: 26px; font-weight: bold; color: #00ff96; margin-bottom: 15px; }
        canvas { border: 4px solid #1a1a1a; border-radius: 15px; background: #000; max-width: 90vw; max-height: 40vh; }

        .controls { display: grid; grid-template-columns: repeat(3, 75px); grid-template-rows: repeat(2, 75px); gap: 12px; margin-top: 25px; }
        .btn-game { background: #111; color: #00f2ea; border: 2px solid #00f2ea; border-radius: 20px; font-size: 32px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0 #008e54; }
        #up { grid-column: 2; }
        #left { grid-column: 1; grid-row: 2; }
        #down { grid-column: 2; grid-row: 2; }
        #right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

    <div id="login-screen" class="overlay">
        <h1 style="color: #00ff96; margin-bottom: 5px;">🐍 YILAN PRO</h1>
        <p style="color: #666; font-size: 13px; margin-bottom: 20px;">Benzersiz ismini seç ve yarış!</p>
        
        <div class="form-group">
            <input type="text" id="username" placeholder="Kullanıcı Adı" maxlength="10">
            <div id="error-msg"></div>
            <button class="btn-ui btn-green" onclick="handleLogin()">OYUNA BAŞLA</button>
        </div>
    </div>

    <div id="game-over-screen" class="overlay">
        <h1 style="color: #ff0050; margin-bottom: 5px;">EYVAH!</h1>
        <p id="final-score-text" style="font-size: 20px; margin-bottom: 25px;"></p>
        
        <button class="btn-ui btn-green" onclick="resetGame()">HEMEN TEKRAR OYNA</button>
        <button class="btn-ui btn-blue" onclick="openLeaderboard()">DİĞER SKORLARA BAK</button>
        <button class="btn-ui btn-gray" onclick="clearMyAccount()">HESABI SİL / YENİ İSİM</button>
    </div>

    <div id="leaderboard-modal" class="overlay">
        <div class="modal-content">
            <h2>🏆 SIRALAMA</h2>
            <div id="full-score-list" class="score-list-full"></div>
            <button class="btn-ui btn-gray" style="width: 100%;" onclick="closeLeaderboard()">GERİ DÖN</button>
        </div>
    </div>

    <div id="game-container">
        <div id="skor-panel"><span id="user-display"></span>: <span id="skor-val">0</span></div>
        <canvas id="snakeBoard" width="400" height="400"></canvas>
        <div class="controls">
            <div class="btn-game" id="up">↑</div>
            <div class="btn-game" id="left">←</div>
            <div class="btn-game" id="down">↓</div>
            <div class="btn-game" id="right">→</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("snakeBoard");
        const ctx = canvas.getContext("2d");
        const grid = 20;
        let score = 0, snake = [], apple = {}, d = "RIGHT", nextD = "RIGHT", currentSpeed = 200;
        let playerName = "", gameRunning = false, loopTimeout;

        // VERİ TABANI SİMÜLASYONU (Local Storage)
        function getGlobalScores() { return JSON.parse(localStorage.getItem("furkanSnakeGlobal") || "[]"); }
        function getMyAccount() { return localStorage.getItem("furkanSnakeAccount"); }

        // GİRİŞ KONTROLÜ
        window.onload = () => {
            const savedName = getMyAccount();
            if(savedName) {
                document.getElementById("username").value = savedName;
                document.getElementById("username").disabled = true;
                document.getElementById("error-msg").innerText = "Kayıtlı hesabınla giriş yapıldı.";
                document.getElementById("error-msg").style.color = "#00f2ea";
            }
        };

        function handleLogin() {
            const input = document.getElementById("username").value.trim();
            const error = document.getElementById("error-msg");
            const globalScores = getGlobalScores();
            const mySavedName = getMyAccount();

            if(!input) { error.innerText = "Bir isim yazmalısın!"; return; }

            // Kural 1: Zaten bir hesabın varsa başka isim alamazsın
            if(mySavedName && input !== mySavedName) {
                error.innerText = "Bu cihaz " + mySavedName + " adına kayıtlı!";
                return;
            }

            // Kural 2: Bu isim başkası tarafından alınmış mı?
            const isTaken = globalScores.some(s => s.name.toLowerCase() === input.toLowerCase());
            if(!mySavedName && isTaken) {
                error.innerText = "Bu isim zaten alınmış!";
                return;
            }

            // Her şey tamamsa kaydet ve başla
            playerName = input;
            localStorage.setItem("furkanSnakeAccount", playerName);
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("game-container").style.display = "flex";
            document.getElementById("user-display").innerText = playerName;
            resetGame();
        }

        function clearMyAccount() {
            if(confirm("Hesabını silersen ismin boşa çıkar ve tüm skorların gider. Emin misin?")) {
                localStorage.removeItem("furkanSnakeAccount");
                location.reload();
            }
        }

        function saveScore() {
            let scores = getGlobalScores();
            // Eğer bu isimle daha önce skor varsa ve yeni skor eskisinden büyükse güncelle
            let userScoreIndex = scores.findIndex(s => s.name === playerName);
            if(userScoreIndex > -1) {
                if(score > scores[userScoreIndex].score) {
                    scores[userScoreIndex].score = score;
                }
            } else {
                scores.push({ name: playerName, score: score });
            }
            localStorage.setItem("furkanSnakeGlobal", JSON.stringify(scores));
        }

        function openLeaderboard() {
            let scores = getGlobalScores();
            scores.sort((a, b) => b.score - a.score);
            document.getElementById("full-score-list").innerHTML = scores.slice(0, 10).map((s, i) => 
                `<div class="full-row"><span>${i+1}. ${s.name}</span><span>${s.score}</span></div>`
            ).join("") || "Henüz rekor yok!";
            document.getElementById("leaderboard-modal").style.display = "flex";
        }

        function closeLeaderboard() { document.getElementById("leaderboard-modal").style.display = "none"; }

        function resetGame() {
            score = 0; currentSpeed = 200; d = "RIGHT"; nextD = "RIGHT";
            snake = [{x: 200, y: 200}, {x: 180, y: 200}];
            apple = { x: 100, y: 100 };
            document.getElementById("skor-val").innerText = "0";
            document.getElementById("game-over-screen").style.display = "none";
            gameRunning = true;
            clearTimeout(loopTimeout);
            gameLoop();
        }

        function gameLoop() {
            if(!gameRunning) return;
            d = nextD;
            ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff0050"; ctx.fillRect(apple.x, apple.y, grid-2, grid-2);
            snake.forEach
