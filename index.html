<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Furkan Hub v30 - Final Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        :root { --neon: #00ff96; --rose: #ff0050; --cyber: #00f2ea; --gold: #ffd700; }
        * { box-sizing: border-box; touch-action: manipulation; user-select: none; outline: none; }
        body { background: #000; margin: 0; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        .screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; padding: 15px; }
        .hidden { display: none !important; }
        
        .panel { background: #111; padding: 20px; border-radius: 25px; border: 3px solid var(--neon); text-align: center; width: 100%; max-width: 340px; box-shadow: 0 0 30px rgba(0,255,150,0.2); }
        .title { font-size: 28px; font-weight: 900; color: var(--neon); text-shadow: 0 0 15px var(--neon); margin-bottom: 15px; }
        
        .btn { padding: 14px; background: var(--neon); color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin: 6px 0; transition: 0.2s; text-decoration: none; display: block; text-align: center; }
        .btn:active { transform: scale(0.95); }

        .social-container { display: flex; gap: 8px; margin-top: 15px; }
        .s-link { flex: 1; padding: 10px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 11px; color: white; text-align: center; }
        .insta-btn { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); }
        .tiktok-btn { background: #222; border: 1px solid #fff; }

        canvas { border: 3px solid var(--cyber); background: #050505; border-radius: 12px; max-width: 90vw; max-height: 50vh; display: block; margin: 0 auto; box-shadow: 0 0 20px rgba(0,242,234,0.2); }
        
        #chess-board { display: grid; grid-template-columns: repeat(8, 1fr); width: 320px; height: 320px; border: 4px solid #444; margin: 5px auto; }
        .cell { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; }
        .w-c { background: #eeeed2; } .b-c { background: #769656; }
        .sel { background: rgba(255, 255, 0, 0.6) !important; }
        
        .p-white { color: #fff; filter: drop-shadow(0 0 2px #000); pointer-events: none; }
        .p-black { color: #000; filter: drop-shadow(0 0 1px #fff); pointer-events: none; }

        .joy { display: grid; grid-template-areas: ". up ." "left down right"; gap: 10px; margin-top: 15px; width: 210px; }
        .j-btn { background: #151515; border: 2px solid var(--cyber); border-radius: 12px; height: 55px; width: 60px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--cyber); cursor: pointer; }
        #up { grid-area: up; margin: 0 auto; } #left { grid-area: left; } #down { grid-area: down; } #right { grid-area: right; }
    </style>
</head>
<body>

    <div id="scr-lobby" class="screen">
        <div class="panel" style="border-color: var(--cyber);">
            <div class="title" style="color:var(--cyber)">FURKAN HUB</div>
            <button class="btn" onclick="hub.start('snake')">🐍 NEON SNAKE</button>
            <button class="btn" onclick="hub.start('bird')">🐦 NEON BIRD</button>
            <button class="btn" onclick="hub.start('climb')" style="background:var(--rose)">🚗 HILL CLIMB</button>
            <button class="btn" onclick="hub.start('chess')" style="background:var(--gold)">♟️ PRO CHESS AI</button>
            <div class="social-container">
                <a href="https://www.instagram.com/furk4nn_c/" target="_blank" class="s-link insta-btn">Instagram</a>
                <a href="https://www.tiktok.com/@furkan_52cc" target="_blank" class="s-link tiktok-btn">TikTok</a>
            </div>
        </div>
    </div>

    <div id="scr-game" class="screen hidden">
        <div id="score-text" style="font-size:18px; color:var(--neon); margin-bottom:10px; font-weight: bold;">SKOR: 0</div>
        <canvas id="gameCanvas" class="hidden"></canvas>
        <div id="chess-board" class="hidden"></div>
        <div id="snake-ui" class="joy hidden">
            <div class="j-btn" id="up">↑</div><div class="j-btn" id="left">←</div>
            <div class="j-btn" id="down">↓</div><div class="j-btn" id="right">→</div>
        </div>
        <button class="btn" style="background:#333; color:#fff; width:120px; margin-top:15px;" onclick="location.reload()">MENÜ</button>
    </div>

    <script>
        const hub = {
            game: null, selectedSq: null, mode: '', score: 0, loop: null,
            start(m) {
                if(this.loop) clearInterval(this.loop);
                this.mode = m;
                document.getElementById("scr-lobby").classList.add("hidden");
                document.getElementById("scr-game").classList.remove("hidden");
                document.getElementById("gameCanvas").classList.add("hidden");
                document.getElementById("chess-board").classList.add("hidden");
                document.getElementById("snake-ui").classList.add("hidden");

                if(m === 'snake') { document.getElementById("gameCanvas").classList.remove("hidden"); document.getElementById("snake-ui").classList.remove("hidden"); this.playSnake(); }
                if(m === 'bird') { document.getElementById("gameCanvas").classList.remove("hidden"); this.playBird(); }
                if(m === 'chess') { document.getElementById("chess-board").classList.remove("hidden"); this.playChess(); }
                if(m === 'climb') { document.getElementById("gameCanvas").classList.remove("hidden"); this.playClimb(); }
            },
            playSnake() {
                const cv = document.getElementById("gameCanvas"); cv.width = 320; cv.height = 320; const cx = cv.getContext("2d");
                let sn = [{x:160,y:160}], ap = {x:40,y:40}, d = "RIGHT", nD = "RIGHT";
                const hI = (k) => {
                    if((k=="UP" || k=="ArrowUp" || k=="w") && d!="DOWN") nD="UP";
                    if((k=="DOWN" || k=="ArrowDown" || k=="s") && d!="UP") nD="DOWN";
                    if((k=="LEFT" || k=="ArrowLeft" || k=="a") && d!="RIGHT") nD="LEFT";
                    if((k=="RIGHT" || k=="ArrowRight" || k=="d") && d!="LEFT") nD="RIGHT";
                };
                window.onkeydown = (e) => hI(e.key);
                document.getElementById("up").onclick = () => hI("UP"); document.getElementById("down").onclick = () => hI("DOWN");
                document.getElementById("left").onclick = () => hI("LEFT"); document.getElementById("right").onclick = () => hI("RIGHT");
                this.loop = setInterval(() => {
                    d = nD; cx.fillStyle = "#000"; cx.fillRect(0,0,320,320);
                    cx.fillStyle = "#ff0050"; cx.fillRect(ap.x+2, ap.y+2, 16, 16);
                    sn.forEach((p, i) => { cx.fillStyle = i==0 ? "#00ff96" : "#00a1ff"; cx.fillRect(p.x+1, p.y+1, 18, 18); });
                    let hX = sn[0].x, hY = sn[0].y;
                    if(d=="UP") hY-=20; if(d=="DOWN") hY+=20; if(d=="LEFT") hX-=20; if(d=="RIGHT") hX+=20;
                    if(hX==ap.x && hY==ap.y) { this.score+=10; ap={x:Math.floor(Math.random()*15)*20, y:Math.floor(Math.random()*15)*20}; } else { sn.pop(); }
                    let nH = {x:hX, y:hY};
                    if(hX<0||hX>=320||hY<0||hY>=320||sn.some(p=>p.x==nH.x&&p.y==nH.y)) { clearInterval(this.loop); location.reload(); }
                    else { sn.unshift(nH); document.getElementById("score-text").innerText = "SKOR: " + this.score; }
                }, 140);
            },
            playBird() {
                const cv = document.getElementById("gameCanvas"); cv.width = 320; cv.height = 420; const cx = cv.getContext("2d");
                let bY = 200, bV = 0, pipes = [], active=true;
                const jump = () => { if(active) bV = -4.5; };
                window.onmousedown = jump; window.onkeydown = (e) => { if(e.code=="Space" || e.key=="ArrowUp") jump(); };
                const loop = () => {
                    if(!active || this.mode !== 'bird') return; cx.fillStyle = "#050505"; cx.fillRect(0,0,320,420); bV += 0.22; bY += bV;
                    cx.fillStyle = "#ffd700"; cx.beginPath(); cx.arc(50, bY, 12, 0, Math.PI*2); cx.fill();
                    if(pipes.length==0 || pipes[pipes.length-1].x < 160) pipes.push({x:320, h:Math.random()*150+50, g:150, ok:false});
                    pipes.forEach((p, i) => { p.x -= 2.2; cx.fillStyle = "#00f2ea"; cx.fillRect(p.x, 0, 50, p.h); cx.fillRect(p.x, p.h+p.g, 50, 420);
                        if(50+10 > p.x && 50-10 < p.x+50 && (bY-10 < p.h || bY+10 > p.h+p.g)) { active=false; location.reload(); }
                        if(p.x < 50 && !p.ok) { p.ok=true; this.score++; }
                    });
                    if(bY > 420 || bY < 0) { active=false; location.reload(); }
                    document.getElementById("score-text").innerText = "SKOR: " + this.score; requestAnimationFrame(loop);
                }; loop();
            },
            playClimb() {
                const cv = document.getElementById("gameCanvas"); cv.width = 320; cv.height = 320; const cx = cv.getContext("2d");
                let cY = 200, vY = 0, ang = 0, fuel = 100, dist = 0, gas = false;
                let ter = []; for(let i=0; i<2000; i++) ter.push(240 + Math.sin(i/12)*35 + Math.cos(i/6)*15);
                window.onkeydown = (e) => { if(e.key=="d" || e.key=="ArrowRight" || e.key==" ") gas = true; };
                window.onkeyup = (e) => { gas = false; };
                cv.onmousedown = () => gas = true; cv.onmouseup = () => gas = false;
                cv.ontouchstart = (e) => { e.preventDefault(); gas = true; }; cv.ontouchend = () => gas = false;
                const loop = () => {
                    if(this.mode !== 'climb') return; cx.fillStyle = "#050505"; cx.fillRect(0,0,320,320);
                    if(gas && fuel > 0) { dist += 3.5; fuel -= 0.15; ang = Math.max(ang - 0.04, -0.3); } 
                    else { dist *= 0.98; ang = Math.min(ang + 0.02, 0.2); }
                    let tx = Math.floor(dist / 5); let gY = ter[tx % 2000];
                    if(cY < gY - 22) vY += 0.8; else { cY = gY - 22; vY = 0; } cY += vY;
                    cx.strokeStyle = "#00f2ea"; cx.lineWidth = 4; cx.beginPath();
                    for(let i=0; i<80; i++) { cx.lineTo(i*5, ter[(tx+i)%2000]); } cx.stroke();
                    cx.save(); cx.translate(60, cY); cx.rotate(ang);
                    cx.fillStyle = "#ff0050"; cx.fillRect(-18, -12, 36, 14); cx.fillStyle = "#fff";
                    cx.beginPath(); cx.arc(-12, 6, 6, 0, 7); cx.fill(); cx.beginPath(); cx.arc(12, 6, 6, 0, 7); cx.fill();
                    cx.restore();
                    document.getElementById("score-text").innerText = `MESAFE: ${Math.floor(dist/10)}m | YAKIT: ${Math.floor(fuel)}%`;
                    if(fuel <= 0 && vY === 0) location.reload(); requestAnimationFrame(loop);
                }; loop();
            },
            playChess() {
                const bd = document.getElementById("chess-board"); this.game = new Chess();
                const ic = { p:'♟', r:'♜', n:'♞', b:'♝', q:'♛', k:'♚' };
                const draw = () => {
                    bd.innerHTML = ""; const st = this.game.board();
                    document.getElementById("score-text").innerText = this.game.in_check() ? "ŞAH!" : "SIRAN SENDE";
                    for(let r=0; r<8; r++) for(let c=0; c<8; c++) {
                        const sq = String.fromCharCode(97+c)+(8-r); const cell = document.createElement("div");
                        cell.className = `cell ${(r+c)%2===0?'w-c':'b-c'}`; const p = st[r][c];
                        if(p) { const s = document.createElement("span"); s.innerText = ic[p.type]; s.className = p.color==='w'?'p-white':'p-black'; cell.appendChild(s); }
                        if(this.selectedSq === sq) cell.classList.add("sel");
                        cell.onclick = () => {
                            if(this.selectedSq) {
                                const m = this.game.move({ from: this.selectedSq, to: sq, promotion: 'q' });
                                if(m) { this.selectedSq = null; draw(); if(!this.game.game_over()) setTimeout(bot, 600); }
                                else { const pc = this.game.get(sq); if(pc && pc.color==='w'){this.selectedSq=sq; draw();} }
                            } else { const pc = this.game.get(sq); if(pc && pc.color==='w'){this.selectedSq=sq; draw();} }
                        }; bd.appendChild(cell);
                    }
                };
                const bot = () => {
                    const ms = this.game.moves(); if(ms.length>0) {
                        const cap = ms.filter(m=>m.includes('x'));
                        this.game.move(cap.length>0?cap[Math.floor(Math.random()*cap.length)]:ms[Math.floor(Math.random()*ms.length)]);
                        draw();
                    }
                }; draw();
            }
        };
    </script>
</body>
</html>
