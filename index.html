<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Furkan Hub v25 - Fix</title>
    <style>
        :root { --neon: #00ff96; --rose: #ff0050; --cyber: #00f2ea; --gold: #ffd700; }
        * { box-sizing: border-box; touch-action: manipulation; user-select: none; outline: none; }
        body { background: #000; margin: 0; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        .screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; padding: 20px; }
        .hidden { display: none !important; }
        
        /* LOBİ PANELİ */
        .panel { background: #111; padding: 25px; border-radius: 25px; border: 3px solid var(--neon); text-align: center; width: 100%; max-width: 340px; box-shadow: 0 0 30px rgba(0,255,150,0.2); }
        .title { font-size: 32px; font-weight: 900; color: var(--neon); text-shadow: 0 0 15px var(--neon); margin-bottom: 20px; }
        
        .btn { padding: 15px; background: var(--neon); color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin: 8px 0; transition: 0.2s; text-decoration: none; display: block; text-align: center; }
        .btn:active { transform: scale(0.95); }

        /* SOSYAL MEDYA */
        .social-container { display: flex; gap: 10px; margin-top: 20px; }
        .s-link { flex: 1; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 11px; color: white; text-align: center; text-transform: uppercase; }
        .insta-btn { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); }
        .tiktok-btn { background: #222; border: 1px solid #fff; }

        /* OYUN ALANI */
        canvas { border: 2px solid #333; background: #000; border-radius: 20px; max-width: 95vw; display: block; margin: 0 auto; }
        
        /* MOBİL TUŞLAR (JOYSTICK FİX) */
        .joy { 
            display: grid; 
            grid-template-areas: ". up ." "left down right"; 
            gap: 10px; 
            margin-top: 20px; 
            width: 220px; /* Sabit genişlik ile dağılmayı önledik */
        }
        .j-btn { 
            background: #151515; border: 2px solid var(--cyber); border-radius: 15px; 
            height: 60px; width: 65px; display: flex; align-items: center; 
            justify-content: center; font-size: 28px; color: var(--cyber); 
        }
        #up { grid-area: up; margin-left: auto; margin-right: auto; }
        #left { grid-area: left; }
        #down { grid-area: down; }
        #right { grid-area: right; }

        #game-over { position: absolute; background: rgba(0,0,0,0.95); inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>

    <div id="scr-lobby" class="screen">
        <div class="panel" style="border-color: var(--cyber);">
            <div class="title" style="color:var(--cyber)">FURKAN HUB</div>
            <button class="btn" onclick="hub.start('snake')">🐍 NEON SNAKE</button>
            <button class="btn" onclick="hub.start('bird')">🐦 NEON BIRD</button>
            <button class="btn" onclick="hub.start('chess')" style="background:var(--gold)">♟️ CHESS AI</button>
            
            <div class="social-container">
                <a href="https://www.instagram.com/furk4nn_c/" target="_blank" class="s-link insta-btn">Instagram</a>
                <a href="https://www.tiktok.com/@furkan_52cc" target="_blank" class="s-link tiktok-btn">TikTok</a>
            </div>
        </div>
    </div>

    <div id="scr-game" class="screen hidden">
        <div id="score-text" style="font-size:22px; color:var(--neon); margin-bottom:5px;">SKOR: 0</div>
        <canvas id="gameCanvas" class="hidden"></canvas>
        
        <div id="snake-ui" class="joy hidden">
            <div class="j-btn" id="up">↑</div>
            <div class="j-btn" id="left">←</div>
            <div class="j-btn" id="down">↓</div>
            <div class="j-btn" id="right">→</div>
        </div>

        <button class="btn" style="background:#333; color:#fff; width:100px; margin-top:15px; font-size: 14px;" onclick="location.reload()">MENÜ</button>
        
        <div id="game-over" class="hidden">
            <h1 style="color:var(--rose); font-size:35px;">OYUN BİTTİ</h1>
            <h2 id="final-score" style="color:white;">SKOR: 0</h2>
            <button class="btn" style="width:180px" onclick="location.reload()">TEKRAR DENE</button>
        </div>
    </div>

    <script>
        const hub = {
            active: false, score: 0, mode: '',
            start(m) {
                this.mode = m; this.active = true; this.score = 0;
                document.getElementById("scr-lobby").classList.add("hidden");
                document.getElementById("scr-game").classList.remove("hidden");
                document.getElementById("gameCanvas").classList.add("hidden");
                document.getElementById("snake-ui").classList.add("hidden");
                if(m === 'snake') { document.getElementById("gameCanvas").classList.remove("hidden"); document.getElementById("snake-ui").classList.remove("hidden"); this.playSnake(); }
                if(m === 'bird') { document.getElementById("gameCanvas").classList.remove("hidden"); this.playBird(); }
            },
            endGame() {
                this.active = false;
                document.getElementById("game-over").classList.remove("hidden");
                document.getElementById("final-score").innerText = "SKOR: " + this.score;
            },
            playSnake() {
                const cv = document.getElementById("gameCanvas"); cv.width = 320; cv.height = 320; const cx = cv.getContext("2d");
                let sn = [{x:160,y:160}], ap = {x:40,y:40}, d = "RIGHT", nD = "RIGHT";
                const setD = (newD) => { 
                    if(newD=="UP"&&d!="DOWN") nD="UP"; if(newD=="DOWN"&&d!="UP") nD="DOWN";
                    if(newD=="LEFT"&&d!="RIGHT") nD="LEFT"; if(newD=="RIGHT"&&d!="LEFT") nD="RIGHT";
                };
                window.onkeydown=(e)=>{if(e.key=="ArrowUp")setD("UP");if(e.key=="ArrowDown")setD("DOWN");if(e.key=="ArrowLeft")setD("LEFT");if(e.key=="ArrowRight")setD("RIGHT")};
                document.getElementById("up").onclick=()=>setD("UP"); document.getElementById("down").onclick=()=>setD("DOWN");
                document.getElementById("left").onclick=()=>setD("LEFT"); document.getElementById("right").onclick=()=>setD("RIGHT");
                const loop = setInterval(() => {
                    if(!this.active) { clearInterval(loop); return; }
                    d = nD; cx.fillStyle = "#000"; cx.fillRect(0,0,320,320);
                    cx.fillStyle = "#ff0050"; cx.fillRect(ap.x, ap.y, 18, 18);
                    sn.forEach((p, i) => { cx.fillStyle = i==0 ? "#00ff96" : "#00a1ff"; cx.fillRect(p.x, p.y, 18, 18); });
                    let hX = sn[0].x, hY = sn[0].y;
                    if(d=="UP") hY-=20; if(d=="DOWN") hY+=20; if(d=="LEFT") hX-=20; if(d=="RIGHT") hX+=20;
                    if(hX==ap.x && hY==ap.y) { this.score+=10; ap={x:Math.floor(Math.random()*15)*20, y:Math.floor(Math.random()*15)*20}; } else { sn.pop(); }
                    let nH = {x:hX, y:hY};
                    if(hX<0||hX>=320||hY<0||hY>=320||sn.some(p=>p.x==nH.x&&p.y==nH.y)) this.endGame();
                    else { sn.unshift(nH); document.getElementById("score-text").innerText = "SKOR: " + this.score; }
                }, 140);
            },
            playBird() {
                const cv = document.getElementById("gameCanvas"); cv.width = 320; cv.height = 420; const cx = cv.getContext("2d");
                let bY = 200, bV = 0, pipes = [];
                window.onmousedown = () => { if(this.active) bV = -4.5; };
                const loop = () => {
                    if(!this.active) return;
                    cx.fillStyle = "#050505"; cx.fillRect(0,0,320,420);
                    bV += 0.22; bY += bV; cx.fillStyle = "#ffd700"; cx.beginPath(); cx.arc(50, bY, 12, 0, Math.PI*2); cx.fill();
                    if(pipes.length==0 || pipes[pipes.length-1].x < 160) pipes.push({x:320, h:Math.random()*150+50, g:150, ok:false});
                    for(let i=pipes.length-1; i>=0; i--) {
                        let p = pipes[i]; p.x -= 2.2; cx.fillStyle = "#00f2ea"; cx.fillRect(p.x, 0, 50, p.h); cx.fillRect(p.x, p.h+p.g, 50, 420);
                        if(50+10 > p.x && 50-10 < p.x+50 && (bY-10 < p.h || bY+10 > p.h+p.g)) this.endGame();
                        if(p.x < 50 && !p.ok) { p.ok=true; this.score++; }
                    }
                    if(bY > 420 || bY < 0) this.endGame();
                    document.getElementById("score-text").innerText = "SKOR: " + this.score;
                    requestAnimationFrame(loop);
                }; loop();
            }
        };
    </script>
</body>
</html>
