<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Furkan Server | Resmi Sayfa</title>
    <style>
        body { 
            background: #000; 
            color: #fff; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            padding: 10px; 
        }
        .box { 
            background: #111; 
            border-radius: 15px; 
            width: 100%; 
            max-width: 400px; 
            padding: 15px; 
            margin-bottom: 15px; 
            text-align: center; 
            border: 2px solid #333; 
            box-sizing: border-box; 
        }
        .social-box { border-color: #00ff96; }
        .game-box { border-color: #ff0050; height: 530px; padding: 0; overflow: hidden; }
        .chat-box { border-color: #00f2ea; height: 450px; padding: 5px; }

        /* BUTON TASARIMLARI */
        .btn { 
            display: block; 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 10px; 
            text-decoration: none; 
            color: #fff; 
            font-weight: bold; 
            font-size: 16px; 
            transition: 0.3s;
        }
        /* Instagram Rengi */
        .btn-insta { 
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); 
        }
        /* TikTok Rengi */
        .btn-tiktok { 
            background: #000; 
            border: 2px solid #fff; 
        }
        .btn:hover { transform: scale(1.05); opacity: 0.9; }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="box social-box">
        <h2 style="color: #00ff96; margin: 0 0 10px 0;">FURKAN SERVER</h2>
        
        <a href="https://www.instagram.com/furk4nn_c/" class="btn btn-insta" target="_blank">📸 Instagram (@furk4nn_c)</a>
        
        <a href="https://www.tiktok.com/@furkan_52cc" class="btn btn-tiktok" target="_blank">🎵 TikTok (@furkan_52cc)</a>
    </div>

    <div class="box game-box">
        <iframe src="yilanoyunu.html"></iframe>
    </div>

    <div class="box chat-box">
        <h3 style="color: #00f2ea; margin: 0 0 10px 0; font-size: 16px;">💬 CANLI SOHBET</h3>
        <iframe 
            src="https://www5.cbox.ws/box/?boxid=962178&boxtag=tg9dzV" 
            sandbox="allow-forms allow-scripts allow-same-origin allow-popups"
            allow="autoplay; fullscreen">
        </iframe>
    </div>

</body>
</html>
