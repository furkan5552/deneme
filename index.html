<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Furkan Hub - Neon Pro Max</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        :root { 
            --neon: #00ff96; 
            --rose: #ff0050; 
            --cyber: #00f2ea; 
            --gold: #ffd700; 
            --bg-dark: #05050a;
            --panel-bg: rgba(15, 15, 20, 0.8);
        }
        
        * { box-sizing: border-box; touch-action: manipulation; user-select: none; outline: none; }
        
        body { 
            margin: 0; 
            font-family: 'Oxanium', 'Segoe UI', sans-serif; /* Profesyonel oyun fontu hissi */
            color: white; 
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            /* Arka plan gradyanı */
            background: linear-gradient(135deg, #05050a 0%, #1a0a2e 50%, #05050a 100%);
            position: relative;
        }

        /* Arka plan ızgara deseni */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0, 242, 234, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 234, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        .screen { 
            position: fixed; inset: 0; 
            background: rgba(0, 0, 0, 0.7); /* Oyun arkasında hafif karartma */
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            z-index: 10; padding: 15px; 
        }
        
        .hidden { display: none !important; }
        
        /* Cam Panel Efekti (Glassmorphism) */
        .panel { 
            background: var(--panel-bg); 
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid rgba(0, 255, 150, 0.3); 
            text-align: center; 
            width: 100%; 
            max-width: 360px; 
            box-shadow: 0 0 30px rgba(0, 255, 150, 0.1), inset 0 0 20px rgba(0, 255, 150, 0.05); 
            backdrop-filter: blur(10px); /* Cam efekti */
        }

        .title { 
            font-size: 36px; 
            font-weight: 900; 
            color: var(--neon); 
            text-shadow: 0 0 10px var(--neon), 0 0 20px rgba(0, 255, 150, 0.5); 
            margin-bottom: 25px; 
            letter-spacing: 2px;
        }
        
        .btn { 
            padding: 16px; 
            background: transparent; 
            color: var(--neon); 
            border: 1px solid var(--neon); 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%; 
            font-size: 16px; 
            margin: 8px 0; 
            transition: 0.3s all ease; 
            text-decoration: none; 
            display: block; 
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn:hover { 
            background: rgba(0, 255, 150, 0.1); 
            box-shadow: 0 0 20px rgba(0, 255, 150, 0.4), inset 0 0 10px rgba(0, 255, 150, 0.2);
            transform: translateY(-2px);
        }
        
        .btn:active { transform: translateY(1px) scale(0.98); }

        .social-container { display: flex; gap: 10px; margin-top: 25px; width: 100%; }
        .s-link { 
            flex: 1; 
            padding: 12px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 12px; 
            color: white; 
            text-align: center; 
            display: flex; align-items: center; justify-content: center; 
            transition: 0.3s; 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .s-link:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.5); }
        .insta-btn { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); }
        .tiktok-btn { background: #111; border: 1px solid #fff; }

        canvas { 
            border: 2px solid var(--cyber); 
            background: rgba(0, 0, 0, 0.8); 
            border-radius: 12px; 
            max-width: 90vw; 
            max-height: 50vh; 
            display: block; 
            margin: 0 auto; 
            box-shadow: 0 0 25px rgba(0, 242, 234, 0.2); 
        }
        
        #chess-board { 
            display: grid; grid-template-columns: repeat(8, 1fr); 
            width: 320px; height: 320px; 
            border: 3px solid rgba(255, 255, 255, 0.1); 
            margin: 5px auto; 
            border-radius: 8px; overflow: hidden;
            background: rgba(0,0,0,0.5);
        }
        
        .cell { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; transition: 0.2s; }
        .w-c { background: rgba(238, 238, 210, 0.05); } 
        .b-c { background: rgba(118, 150, 86, 0.1); }
        
        .blast-cell { background: rgba(25, 25, 30, 0.5); border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .blast-filled { 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 0 10px currentColor; 
            border: 1px solid rgba(255,255,255,0.4);
            animation: pop 0.3s ease-out;
        }
        .blast-clear { animation: explode 0.5s forwards; }

        @keyframes pop { 0% { transform: scale(0.8); } 100% { transform: scale(1); } }
        @keyframes explode { 
            0% { transform: scale(1); filter: brightness(2); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-2px); }
            75% { transform: translateX(2px); }
        }

        .piece-box { display: flex; justify-content: center; gap: 10px; margin-top: 20px; min-height: 80px; }
        .p-preview { 
            background: rgba(25, 25, 30, 0.6); 
            padding: 8px; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); 
            cursor: pointer; transition: 0.3s; 
        }
        .p-preview.selected { border-color: white; background: rgba(40, 40, 50, 0.8); box-shadow: 0 0 15px white; transform: translateY(-3px); }

        .joy { display: grid; grid-template-areas: ". up ." "left down right"; gap: 10px; margin-top: 15px; width: 210px; }
        .j-btn { 
            background: rgba(20, 20, 25, 0.8); 
            border: 1px solid var(--cyber); 
            border-radius: 10px; 
            height: 55px; width: 60px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 24px; color: var(--cyber); 
            cursor: pointer; font-weight: bold; 
            transition: 0.2s;
        }
        .j-btn:hover { background: rgba(0, 242, 234, 0.1); box-shadow: 0 0 15px rgba(0, 242, 234, 0.3); }
        .j-btn:active { transform: scale(0.95); }

        /* Font ekleme (Oxanium - Profesyonel Oyun Fontu) */
        @import url('https://fonts.googleapis.com/css2?family=Oxanium:wght@400;700;900&display=swap');
    </style>
</head>
<body>

    <div id="scr-lobby" class="screen">
        <div class="panel" style="border-color: var(--cyber);">
            <div class="title" style="color:var(--cyber)">FURKAN HUB</div>
            <button class="btn" onclick="hub.start('snake')">🐍 NEON SNAKE</button>
            <button class="btn" onclick="hub.start('bird')">🐦 NEON BIRD</button>
            <button class="btn" onclick="hub.start('blast')" style="border-color:var(--cyber); color:var(--cyber)">🧱 BLOCK BLAST</button>
            <button class="btn" onclick="hub.start('chess')" style="border-color:var(--gold); color:var(--gold)">♟️ PRO CHESS AI</button>
            <div class="social-container">
                <a href="https://www.instagram.com/furk4nn_c/" target="_blank" class="s-link insta-btn">Instagram</a>
                <a href="https://www.tiktok.com/@furkan_52cc" target="_blank" class="s-link tiktok-btn">TikTok</a>
            </div>
        </div>
    </div>

    <div id="scr-game" class="screen hidden">
        <div id="score-text" style="font-size:20px; color:var(--neon); margin-bottom:10px; font-weight: bold; font-family:'Oxanium'; text-shadow:0 0 10px var(--neon);">SKOR: 0</div>
        <div id="chess-board" class="hidden"></div>
        <canvas id="gameCanvas" class="hidden"></canvas>
        <div id="piece-area" class="piece-box hidden"></div>
        <div id="snake-ui" class="joy hidden">
            <div class="j-btn" id="up">↑</div><div class="j-btn" id="left">←</div>
            <div class="j-btn" id="down">↓</div><div class="j-btn" id="right">→</div>
        </div>
        <button class="btn" style="border-color:#555; color:#fff; width:120px; margin-top:15px;" onclick="location.reload()">MENÜ</button>
    </div>

    <script>
        const hub = {
            mode: '', loop: null, sSq: null, score: 0,
            blastGrid: [], blastPieces: [], blastSelected: null,
            colors: ['#00f2ea', '#ff0050', '#00ff96', '#ffd700', '#ff00ff', '#7000ff'],

            start(m) {
                if(this.loop) { clearInterval(this.loop); this.loop = null; }
                this.mode = m; this.score = 0; this.blastSelected = null;
                document.getElementById("scr-lobby").classList.add("hidden");
                document.getElementById("scr-game").classList.remove("hidden");
                document.getElementById("gameCanvas").classList.add("hidden");
                document.getElementById("chess-board").classList.add("hidden");
                document.getElementById("snake-ui").classList.add("hidden");
                document.getElementById("piece-area").classList.add("hidden");
                document.getElementById("score-text").innerText = "SKOR: 0";

                if(m === 'snake') {
                    document.getElementById("gameCanvas").classList.remove("hidden");
                    document.getElementById("snake-ui").classList.remove("hidden");
                    this.playSnake();
                } else if(m === 'bird') {
                    document.getElementById("gameCanvas").classList.remove("hidden");
                    this.playBird();
                } else if(m === 'chess') {
                    document.getElementById("chess-board").classList.remove("hidden");
                    this.playChess();
                } else if(m === 'blast') {
                    document.getElementById("chess-board").classList.remove("hidden");
                    document.getElementById("piece-area").classList.remove("hidden");
                    this.playBlast();
                }
            },

            playSnake() {
                const cv = document.getElementById("gameCanvas"); cv.width = 320; cv.height = 320;
                const cx = cv.getContext("2d");
                let sn = [{x:160,y:160}], ap = {x:40,y:40}, d = "RIGHT", nD = "RIGHT";
                const h = (k) => {
                    const key = k.toUpperCase();
                    if((key=="UP"||key=="W"||key=="ARROWUP")&&d!="DOWN") nD="UP";
                    if((key=="DOWN"||key=="S"||key=="ARROWDOWN")&&d!="UP") nD="DOWN";
                    if((key=="LEFT"||key=="A"||key=="ARROWLEFT")&&d!="RIGHT") nD="LEFT";
                    if((key=="RIGHT"||key=="D"||key=="ARROWRIGHT")&&d!="LEFT") nD="RIGHT";
                };
                window.onkeydown=(e)=>h(e.key);
                document.getElementById("up").onclick=()=>h("UP"); document.getElementById("down").onclick=()=>h("DOWN");
                document.getElementById("left").onclick=()=>h("LEFT"); document.getElementById("right").onclick=()=>h("RIGHT");
                this.loop = setInterval(() => {
                    d=nD; cx.fillStyle="#000"; cx.fillRect(0,0,320,320);
                    cx.fillStyle="#ff0050"; cx.fillRect(ap.x+2,ap.y+2,16,16);
                    sn.forEach((p,i)=>{ cx.fillStyle=i==0?"#00ff96":"#00a1ff"; cx.fillRect(p.x+1,p.y+1,18,18); });
                    let hX=sn[0].x, hY
