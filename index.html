<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Furkan Hub v21</title>
    <style>
        :root { --neon: #00ff96; --rose: #ff0050; --cyber: #00f2ea; --gold: #ffd700; }
        * { box-sizing: border-box; touch-action: manipulation; user-select: none; outline: none; }
        body { background: #000; margin: 0; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; padding: 20px; }
        .hidden { display: none !important; }
        .panel { background: #111; padding: 25px; border-radius: 25px; border: 3px solid var(--neon); text-align: center; width: 100%; max-width: 340px; box-shadow: 0 0 30px rgba(0,255,150,0.2); }
        .title { font-size: 32px; font-weight: 900; color: var(--neon); text-shadow: 0 0 15px var(--neon); margin-bottom: 25px; }
        
        .btn { padding: 15px; background: var(--neon); color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin: 8px 0; transition: 0.2s; text-decoration: none; display: block; }
        .btn:active { transform: scale(0.95); }

        /* SOSYAL MEDYA BUTONLARI */
        .social-container { display: flex; gap: 10px; margin-top: 20px; width: 100%; }
        .s-link { 
            flex: 1; padding: 12px; border-radius: 12px; text-decoration: none; 
            font-weight: bold; font-size: 12px; color: white; text-align: center;
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .insta-btn { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); box-shadow: 0 4px 15px rgba(220, 39, 67, 0.3); }
        .tiktok-btn { background: #000; border: 1px solid #fff; box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1); }
        
        .s-link:hover { opacity: 0.8; transform: translateY(-2px); }

        /* OYUN ARAÇLARI */
        #gameCanvas { border: 2px solid #333; background: #000; border-radius: 20px; max-width: 100%; }
        .joy { display: grid; grid-template-columns: repeat(3, 75px); gap: 12px; margin-top: 20px; }
        .j-btn { background: #151515; border: 2px solid var(--cyber); border-radius: 18px; height: 65px; display: flex; align-items: center; justify-content: center; font-size: 32px; color: var(--cyber); }
    </style>
</head>
<body>

    <div id="scr-lobby" class="screen">
        <div class="panel" style="border-color: var(--cyber);">
            <div class="title" style="color:var(--cyber)">FURKAN HUB</div>
            
            <button class="btn" onclick="hub.start('snake')">🐍 NEON SNAKE</button>
            <button class="btn" onclick="hub.start('bird')">🐦 NEON BIRD</button>
            <button class="btn" onclick="hub.start('chess')" style="background:var(--gold)">♟️ CHESS vs AI</button>
            
            <div class="social-container">
                <a href="https://www.instagram.com/furk4nn_c/" target="_blank" class="s-link insta-btn">INSTAGRAM</a>
                <a href="https://www.tiktok.com/@furkan_52cc" target="_blank" class="s-link tiktok-btn">TIKTOK</a>
            </div>

            <p style="font-size: 10px; color: #555; margin-top: 15px;">v21 - Social Fixed</p>
        </div>
    </div>

    <div id="scr-game" class="screen hidden">
        <div id="score-text" style="font-size:24px; color:var(--neon); margin-bottom:10px;">SKOR: 0</div>
        <canvas id="gameCanvas"></canvas>
        <div id="snake-ui" class="joy hidden">
            <div class="j-btn" id="up">↑</div><div class="j-btn" id="left">←</div>
            <div class="j-btn" id="down">↓</div><div class="j-btn" id="right">→</div>
        </div>
        <button class="btn" style="background:#333; color:#fff; width:120px; margin-top:20px;" onclick="location.reload()">MENÜ</button>
    </div>

    <script>
        const hub = {
            active: false, score: 0,
            start(m) {
                this.active = true; this.score = 0;
                document.getElementById("scr-lobby").classList.add("hidden");
                document.getElementById("scr-game").classList.remove("hidden");
                if(m === 'snake') this.playSnake();
                // Diğer oyunlar (Bird/Chess) buraya eklenebilir.
            },
            playSnake() {
                const cv = document.getElementById("gameCanvas"); cv.width = 360; cv.height = 360; const cx = cv.getContext("2d");
                document.getElementById("snake-ui").classList.remove("hidden");
                let sn = [{x:180,y:180}], ap = {x:80,y:80}, d = "RIGHT", nD = "RIGHT";
                document.getElementById("up").onclick=()=> {if(d!="DOWN") nD="UP"};
                document.getElementById("down").onclick=()=> {if(d!="UP") nD="DOWN"};
                document.getElementById("left").onclick=()=> {if(d!="RIGHT") nD="LEFT"};
                document.getElementById("right").onclick=()=> {if(d!="LEFT") nD="RIGHT"};
                
                const gameLoop = setInterval(() => {
                    if(!this.active) { clearInterval(gameLoop); return; }
                    d = nD; cx.fillStyle = "#000"; cx.fillRect(0,0,360,360);
                    cx.fillStyle = "#ff0050"; cx.fillRect(ap.x, ap.y, 18, 18);
                    sn.forEach((p, i) => { cx.fillStyle = i==0 ? "#00ff96" : "#00a1ff"; cx.fillRect(p.x, p.y, 18, 18); });
                    let hX = sn[0].x, hY = sn[0].y;
                    if(d=="UP") hY-=20; if(d=="DOWN") hY+=20; if(d=="LEFT") hX-=20; if(d=="RIGHT") hX+=20;
                    if(hX==ap.x && hY==ap.y) { this.score+=10; ap={x:Math.floor(Math.random()*17)*20, y:Math.floor(Math.random()*17)*20}; } else { sn.pop(); }
                    let nH = {x:hX, y:hY};
                    if(hX<0||hX>=360||hY<0||hY>=360||sn.some(p=>p.x==nH.x&&p.y==nH.y)) { this.active=false; alert("SKOR: "+this.score); location.reload(); }
                    else { sn.unshift(nH); }
                    document.getElementById("score-text").innerText = "SKOR: " + this.score;
                }, 120);
            }
        };
    </script>
</body>
</html>
