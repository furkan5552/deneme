<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Furkan Hub v12 - Perfect Physics</title>
    <style>
        :root { --neon: #00ff96; --rose: #ff0050; --cyber: #00f2ea; --gold: #ffd700; }
        * { box-sizing: border-box; touch-action: manipulation; user-select: none; outline: none; }
        body { background: #000; margin: 0; font-family: sans-serif; color: white; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        .screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .hidden { display: none !important; }

        .panel { background: #111; padding: 25px; border-radius: 25px; border: 3px solid var(--neon); text-align: center; width: 330px; box-shadow: 0 0 30px rgba(0,255,150,0.2); }
        .title { font-size: 34px; font-weight: 900; color: var(--neon); text-shadow: 0 0 15px var(--neon); margin-bottom: 20px; }
        input { padding: 15px; border: 2px solid var(--neon); background: #000; color: #fff; border-radius: 12px; width: 100%; text-align: center; margin-bottom: 15px; font-size: 18px; }
        
        .btn { padding: 15px; background: var(--neon); color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 18px; margin: 6px 0; }
        .btn-gray { background: #222; color: #888; border: 1px solid #444; }

        #scoreboard { z-index: 9999; background: rgba(0,0,0,0.97); }
        .rank-list { background: #050505; border-radius: 15px; padding: 12px; margin: 15px 0; border: 1px solid #333; }
        .rank-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #111; font-size: 14px; }
        .rank-item.top { color: var(--gold); font-weight: bold; border-left: 3px solid var(--gold); padding-left: 10px; }

        canvas { border: 2px solid #333; background: #000; border-radius: 20px; max-width: 92vw; }
        .live-score { font-size: 28px; color: var(--neon); margin-bottom: 12px; font-weight: bold; }

        .joy { display: grid; grid-template-columns: repeat(3, 75px); gap: 12px; margin-top: 25px; }
        .j-btn { background: #151515; border: 2px solid var(--cyber); border-radius: 18px; height: 75px; display: flex; align-items: center; justify-content: center; font-size: 32px; color: var(--cyber); box-shadow: 0 4px 0 var(--cyber); }
        #up { grid-column: 2; } #left { grid-column: 1; grid-row: 2; } #down { grid-column: 2; grid-row: 2; } #right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

    <div id="scr-login" class="screen">
        <div class="panel">
            <div class="title">NEON HUB</div>
            <input type="text" id="nick" placeholder="ADINI YAZ">
            <button class="btn" onclick="hub.login()">BAŞLAT</button>
        </div>
    </div>

    <div id="scr-lobby" class="screen hidden">
        <div class="title" style="font-size: 20px;">HOŞ GELDİN <span id="u-display" style="color:var(--cyber)"></span></div>
        <div class="panel" style="border-color: var(--cyber);">
            <button class="btn" onclick="hub.start('snake')">🐍 NEON SNAKE</button>
            <button class="btn" onclick="hub.start('bird')">🐦 NEON BIRD</button>
            <button class="btn btn-gray" style="margin-top:20px;" onclick="hub.reset()">SIFIRLA</button>
        </div>
    </div>

    <div id="scr-game" class="screen hidden">
        <div class="live-score">PUAN: <span id="val-now">0</span></div>
        <canvas id="gameCanvas"></canvas>
        <div id="snake-ui" class="joy hidden">
            <div class="j-btn" id="up">↑</div><div class="j-btn" id="left">←</div>
            <div class="j-btn" id="down">↓</div><div class="j-btn" id="right">→</div>
        </div>
        <button class="btn btn-gray" style="width:140px; font-size:14px; margin-top:20px;" onclick="location.reload()">MENÜ</button>
    </div>

    <div id="scoreboard" class="screen hidden">
        <div class="panel" style="border-color: var(--rose);">
            <div class="title" style="color:var(--rose);">ÖLDÜN!</div>
            <div id="val-final" style="font-size: 60px; font-weight: 900; margin: 5px 0;">0</div>
            <div style="color: var(--gold); font-size: 14px; margin-top: 10px; font-weight: bold;">🏆 EN İYİ 5 SKORUN</div>
            <div id="rank-box" class="rank-list"></div>
            <button class="btn" onclick="hub.restart()">TEKRAR DENE</button>
            <button class="btn btn-gray" onclick="location.reload()">MENÜ</button>
        </div>
    </div>

    <script>
        const hub = {
            active: false, mode: '', score: 0,
            login() { const n = document.getElementById("nick").value.trim(); if(n){ localStorage.setItem("f_user", n); this.showLobby(); } },
            showLobby() { document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden')); document.getElementById("scr-lobby").classList.remove('hidden'); document.getElementById("u-display").innerText = localStorage.getItem("f_user").toUpperCase(); },
            reset() { localStorage.clear(); location.reload(); },
            start(m) {
                this.mode = m; this.score = 0; this.active = true;
                document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
                document.getElementById("scr-game").classList.remove('hidden');
                document.getElementById("val-now").innerText = "0";
                if(m === 'snake') { document.getElementById("snake-ui").classList.remove("hidden"); this.initSnake(); }
                else { document.getElementById("snake-ui").classList.add("hidden"); this.initBird(); }
            },
            restart() { document.getElementById("scoreboard").classList.add("hidden"); this.start(this.mode); },
            finish() {
                this.active = false;
                let list = JSON.parse(localStorage.getItem("best_" + this.mode) || "[]");
                list.push(this.score); list.sort((a, b) => b - a); list = list.slice(0, 5);
                localStorage.setItem("best_" + this.mode, JSON.stringify(list));
                const box = document.getElementById("rank-box"); box.innerHTML = "";
                list.forEach((s, i) => { box.innerHTML += `<div class="rank-item ${i===0?'top':''}"><span>#${i+1} REKOR</span><span>${s}</span></div>`; });
                document.getElementById("val-final").innerText = this.score;
                document.getElementById("scoreboard").classList.remove("hidden");
            },

            initSnake() {
                const cv = document.getElementById("gameCanvas"); cv.width = 400; cv.height = 400; const cx = cv.getContext("2d");
                let sn = [{x:200,y:200},{x:180,y:200}], ap = {x:100,y:100}, d = "RIGHT", nD = "RIGHT";
                const setD = (dir) => { if(dir=="UP"&&d!="DOWN")nD="UP"; if(dir=="DOWN"&&d!="UP")nD="DOWN"; if(dir=="LEFT"&&d!="RIGHT")nD="LEFT"; if(dir=="RIGHT"&&d!="LEFT")nD="RIGHT"; };
                document.getElementById("up").onclick = () => setD("UP"); document.getElementById("down").onclick = () => setD("DOWN");
                document.getElementById("left").onclick = () => setD("LEFT"); document.getElementById("right").onclick = () => setD("RIGHT");
                window.onkeydown = (e) => { if(e.key.includes("Arrow")) setD(e.key.replace("Arrow","").toUpperCase()); };
                const sInterval = setInterval(() => {
                    if(!this.active) { clearInterval(sInterval); return; }
                    d = nD; cx.fillStyle = "#0c0c0c"; cx.fillRect(0,0,400,400);
                    cx.strokeStyle = "#1a2a3a"; for(let x=0;x<=400;x+=20){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,400);cx.stroke();} for(let y=0;y<=400;y+=20){cx.beginPath();cx.moveTo(0,y);cx.lineTo(400,y);cx.stroke();}
                    cx.fillStyle = "#ff0050"; cx.shadowBlur = 15; cx.shadowColor = "#ff0050"; cx.fillRect(ap.x+2, ap.y+2, 16, 16); cx.shadowBlur = 0;
                    sn.forEach((p,i) => { cx.fillStyle = i==0? "#00ff96":"#00a1ff"; cx.fillRect(p.x, p.y, 18, 18); });
                    let hX = sn[0].x, hY = sn[0].y;
                    if(d=="UP")hY-=20; if(d=="DOWN")hY+=20; if(d=="LEFT")hX-=20; if(d=="RIGHT")hX+=20;
                    if(hX==ap.x && hY==ap.y) { this.score+=10; document.getElementById("val-now").innerText = this.score; ap={x:Math.floor(Math.random()*19)*20, y:Math.floor(Math.random()*19)*20}; } else { sn.pop(); }
                    let nH = {x:hX, y:hY};
                    if(hX<0||hX>=400||hY<0||hY>=400||sn.some(p=>p.x==nH.x&&p.y==nH.y)) { clearInterval(sInterval); this.finish(); } else { sn.unshift(nH); }
                }, 110);
            },

            initBird() {
                const cv = document.getElementById("gameCanvas"); cv.width = 320; cv.height = 480; const cx = cv.getContext("2d");
                let bY = 240, bV = 0, pipes = [];
                // FİZİK GÜNCELLEMESİ
                const grav = 0.22; 
                const jump = -4.8; // Daha kontrollü zıplama
                const maxFall = 7; // LİMİT HIZ: Kuşun sonsuz hızlanmasını engeller

                const flap = () => { if(this.active) bV = jump; };
                window.onmousedown = flap; window.ontouchstart = (e) => { flap(); e.preventDefault(); };
                window.onkeydown = (e) => { if(e.key === " ") flap(); };

                const bLoop = () => {
                    if(!this.active) return;
                    cx.fillStyle = "#050505"; cx.fillRect(0,0,320,480);
                    
                    bV += grav;
                    if(bV > maxFall) bV = maxFall; // Hızı sabitle
                    bY += bV;

                    cx.fillStyle = "#ffd700"; cx.shadowBlur = 15; cx.shadowColor = "#ffd700";
                    cx.beginPath(); cx.arc(60, bY, 12, 0, Math.PI*2); cx.fill(); cx.shadowBlur = 0;

                    if(pipes.length==0 || pipes[pipes.length-1].x < 170) pipes.push({x:320, h:Math.random()*200+60, g:160, passed:false});
                    for(let i=pipes.length-1; i>=0; i--) {
                        let p = pipes[i]; p.x -= 2.4;
                        cx.fillStyle = "#00f2ea"; cx.fillRect(p.x, 0, 50, p.h); cx.fillRect(p.x, p.h+p.g, 50, 480);
                        if(60+10>p.x && 60-10<p.x+50 && (bY-10<p.h || bY+10>p.h+p.g)) this.active = false;
                        if(p.x < 60 && !p.passed) { p.passed = true; this.score++; document.getElementById("val-now").innerText = this.score; }
                        if(p.x < -60) pipes.splice(i,1);
                    }
                    if(bY>480 || bY<0) this.active = false;
                    if(!this.active) this.finish(); else requestAnimationFrame(bLoop);
                };
                bLoop();
            }
        };
        if(localStorage.getItem("f_user")) hub.showLobby();
    </script>
</body>
</html>
